<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f7;
      color: #1d1d1f;
      padding: 40px 20px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
    .tools { display: flex; flex-direction: column; gap: 12px; max-width: 400px; }
    .tool-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: white;
      border: none;
      border-radius: 12px;
      padding: 16px 18px;
      text-decoration: none;
      color: #1d1d1f;
      cursor: pointer;
      text-align: left;
    }
    .tool-btn:active { opacity: 0.7; }
    .tool-icon { font-size: 28px; line-height: 1; }
    .tool-info .name { font-size: 16px; font-weight: 600; }
    .tool-info .desc { font-size: 13px; color: #8e8e93; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>My Tools</h1>
  <div class="tools">
    <a class="tool-btn" href="stock-signal.html">
      <span class="tool-icon">🚦</span>
      <div class="tool-info">
        <div class="name">내 포지션 신호등</div>
        <div class="desc">주식 포지션 상태 추적</div>
      </div>
    </a>
    <a class="tool-btn" href="life-log.html">
      <span class="tool-icon">📋</span>
      <div class="tool-info">
        <div class="name">라이프 로그</div>
        <div class="desc">약 복용 · 수면 기록 및 그래프</div>
      </div>
    </a>
  </div>
</body>
</html>
