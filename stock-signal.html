<script>
// ---------- ?뷀샇 寃뚯씠??----------
(function(){
  const PASS = '1029';
  const gate = document.getElementById('passGate');
  if(sessionStorage.getItem('auth') === 'ok'){ gate.remove(); return; }

  function tryUnlock(){
    const input = document.getElementById('passInput');
    if(input.value === PASS){
      sessionStorage.setItem('auth', 'ok');
      gate.style.transition = 'opacity .2s';
      gate.style.opacity = '0';
      setTimeout(()=> gate.remove(), 200);
    } else {
      document.getElementById('passErr').textContent = '?뷀샇媛 ??몄뒿?덈떎';
      input.value = '';
      input.focus();
    }
  }

  document.getElementById('passBtn').addEventListener('click', tryUnlock);
  document.getElementById('passInput').addEventListener('keydown', e=>{
    if(e.key === 'Enter') tryUnlock();
    else document.getElementById('passErr').textContent = '';
  });
})();

const REFRESH_MS = 60000;
let holdings = [];

// ---------- storage ----------
function loadHoldings(){
  try{
    const raw = localStorage.getItem('holdings');
    if(raw) holdings = JSON.parse(raw);
    holdings.forEach(h=>{
      if(h.qty == null) h.qty = 0;
      if(!h.addedAt) h.addedAt = Date.now();
    });
  }catch(e){ holdings = []; }
  render();
}
function saveHoldings(){
  try{ localStorage.setItem('holdings', JSON.stringify(holdings)); }
  catch(e){ console.error('????ㅽ뙣', e); }
}

// ---------- status ----------
function computeStatus(avg, current, prev){
  if(!avg || !current) return {label:null, seg:null, pct:null};
  if(current < avg){
    const d = (avg - current) / avg * 100;
    if(d > 10) return {label:'留ㅼ슦 ?먯젅 異붿쿇', seg:0, pct:-d};
    if(d > 7)  return {label:'?먯젅 異붿쿇',      seg:1, pct:-d};
    if(d > 5)  return {label:null,             seg:2, pct:-d};
    return              {label:'臾쇳?湲?異붿쿇',   seg:3, pct:-d};
  }
  if(!prev) return {label:null, seg:4, pct:null};
  const c = (current - prev) / prev * 100;
  if(c < -5)  return {label:'留ㅻ룄 ?섏씡??媛??, seg:5, pct:c};
  if(c <= 0)  return {label:'踰꾪떚湲?,           seg:4, pct:c};
  if(c <= 15) return {label:'?곸듅??,           seg:6, pct:c};
  return              {label:'留ㅼ슦?곸듅??,       seg:7, pct:c};
}
const SEG_LABELS = ['留ㅼ슦?먯젅','?먯젅','愿留?,'臾쇳?湲?,'踰꾪떚湲?,'?섏씡?붽???,'?곸듅??,'留ㅼ슦?곸듅??];

// ---------- price fetch ----------
async function fetchPrice(code){
  try{
    const res = await fetch(`https://polling.finance.naver.com/api/realtime/domestic/stock/${code}`);
    if(!res.ok) throw new Error();
    const data = await res.json();
    const d = data?.datas?.[0];
    if(!d) throw new Error();
    const current = Number(d.closePrice ?? d.now ?? d.tradePrice);
    const prev    = Number(d.basePrice ?? d.standardPrice ?? d.previousClose);
    if(!current || !prev) throw new Error();
    return {current, prev};
  }catch(e){ return null; }
}

let autoFetchWorked = null;
async function refreshAll(){
  if(!holdings.length) return;
  let anySuccess = false;
  for(const h of holdings){
    const r = await fetchPrice(h.code);
    if(r){ h.current = r.current; h.prev = r.prev; h.manual = false; h.lastUpdate = Date.now(); anySuccess = true; }
  }
  if(anySuccess){ autoFetchWorked = true; setStatus(true); }
  else if(holdings.some(h=>!h.manual)){ autoFetchWorked = false; setStatus(false); }
  saveHoldings();
  render();
}
function setStatus(ok){
  document.getElementById('liveDot').className = ok ? 'dot live' : 'dot';
  document.getElementById('statusText').textContent = ok
    ? '?먮룞議고쉶 ?뺤긽 ??60珥덈쭏??媛깆떊 以?
    : '?먮룞議고쉶 ?ㅽ뙣 ???꾩옱媛/?꾩씪媛瑜?吏곸젒 ?낅젰?댁＜?몄슂';
}

// ---------- trade ----------
function applyBuy(idx, buyQty, buyPrice){
  const h = holdings[idx];
  const oldQty = Number(h.qty) || 0;
  const oldAvg = Number(h.avg) || 0;
  const newQty = oldQty + buyQty;
  h.avg = newQty > 0 ? Math.round((oldAvg * oldQty + buyPrice * buyQty) / newQty) : oldAvg;
  h.qty = newQty;
}
function applySell(idx, sellQty, sellPrice){
  const h = holdings[idx];
  const qty = Number(h.qty) || 0;
  const avg = Number(h.avg) || 0;
  const actual = Math.min(sellQty, qty);
  const pnl = (sellPrice - avg) * actual;
  h.qty = qty - actual;
  h.lastSell = {qty: actual, price: sellPrice, pnl, at: Date.now()};
}

// ---------- format ----------
function fmtNum(n){ return (n == null || isNaN(n)) ? '-' : Number(n).toLocaleString(); }
function fmtPct(p){ return p == null ? '-' : `${p>0?'+':''}${p.toFixed(2)}%`; }
function fmtPnl(n){
  if(n == null || isNaN(n)) return '-';
  return `${n>0?'+':''}${Math.round(n).toLocaleString()}??;
}
function pctCls(p){ return !p ? 'pct-flat' : p>0 ? 'pct-up' : 'pct-down'; }
function pnlCls(n){ return !n||isNaN(n) ? 'pnl-flat' : n>0 ? 'pnl-up' : 'pnl-down'; }
function fmtDate(ts){
  if(!ts) return '';
  const d = new Date(ts);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${d.getFullYear()}.${mm}.${dd} ${hh}:${mi}`;
}

// ---------- render ----------
function segColor(s){
  return ['#3A6BD9','#4C8DFF','#3A3F48','#FFC857','#4A4F58','#FFA84A','#E84142','#FF5A5C'][s] ?? '#3A3F48';
}

function render(){
  const container = document.getElementById('cards');
  const empty     = document.getElementById('emptyMsg');
  container.innerHTML = '';
  empty.style.display = holdings.length ? 'none' : 'block';

  holdings.forEach((h, idx)=>{
    const avg     = Number(h.avg)     || 0;
    const current = Number(h.current) || 0;
    const prev    = Number(h.prev)    || 0;
    const qty     = Number(h.qty)     || 0;

    const st = computeStatus(avg, current||null, prev||null);
    const diffAvg  = (avg && current) ? (current-avg)/avg*100 : null;
    const diffPrev = (current && prev) ? (current-prev)/prev*100 : null;
    const invest   = (avg && qty) ? avg*qty : null;
    const evalAmt  = (current && qty) ? current*qty : null;
    const pnlAmt   = (invest != null && evalAmt != null) ? evalAmt-invest : null;
    const manual   = h.manual ? '<span style="color:var(--gold);font-size:10px">(?섎룞)</span>' : '';

    const badgeHtml = st.label
      ? `<span class="badge" style="background:${segColor(st.seg)};color:#0F1115">${st.label}</span>`
      : `<span class="badge none">愿留?/span>`;

    let lastSellHtml = '';
    if(h.lastSell){
      const s = h.lastSell;
      const cls = s.pnl >= 0 ? 'pnl-up' : 'pnl-down';
      lastSellHtml = `
        <div class="last-sell">
          <span>吏곸쟾 留ㅻ룄 ${fmtDate(s.at)} 쨌 ${s.qty}二?@ ${fmtNum(s.price)}</span>
          <span class="pnl-val ${cls}">${fmtPnl(s.pnl)}</span>
        </div>`;
    }

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div class="name-block">
          <div class="name">${h.name}</div>
          <div class="code">${h.code}</div>
        </div>
        ${badgeHtml}
      </div>
      <div class="numbers">
        <div class="box">
          <label>留ㅼ엯?됯퇏?④?</label>
          <div class="val">${fmtNum(avg)}</div>
        </div>
        <div class="box">
          <label>?꾩옱媛 ${manual}</label>
          <input type="number" data-idx="${idx}" data-field="current" value="${h.current??''}" placeholder="?낅젰">
        </div>
        <div class="box">
          <label>?꾩씪媛 ${manual}</label>
          <input type="number" data-idx="${idx}" data-field="prev" value="${h.prev??''}" placeholder="?낅젰">
        </div>
        <div class="box">
          <label>留ㅼ엯媛 ?鍮?/ ?꾩씪媛 ?鍮?/label>
          <div class="val">
            <span class="${pctCls(diffAvg)}">${fmtPct(diffAvg)}</span> /
            <span class="${pctCls(diffPrev)}">${fmtPct(diffPrev)}</span>
          </div>
        </div>
        <div class="box">
          <label>蹂댁쑀?섎웾</label>
          <input type="number" data-idx="${idx}" data-field="qty" value="${qty||''}" placeholder="?섎웾">
        </div>
        <div class="box">
          <label>?ъ옄?먭툑</label>
          <div class="val">${fmtNum(invest)}</div>
        </div>
        <div class="box">
          <label>?됯?湲덉븸</label>
          <div class="val">${evalAmt!=null ? fmtNum(Math.round(evalAmt)) : '-'}</div>
        </div>
        <div class="box">
          <label>?됯??먯씡</label>
          <div class="val ${pnlCls(pnlAmt)}">${fmtPnl(pnlAmt)}</div>
        </div>
      </div>
      <div class="gauge">
        ${[0,1,2,3,4,5,6,7].map(i=>`<div class="seg s${i}${st.seg===i?' active':''}"><span>${SEG_LABELS[i]}</span></div>`).join('')}
      </div>
      <div class="trade-bar">
        <div class="trade-section">
          <span class="trade-label buy">留ㅼ닔</span>
          <input type="number" class="t-qty" placeholder="?섎웾" min="1">
          <input type="number" class="t-price" placeholder="?④?">
          <button class="trade-btn buy-btn" data-idx="${idx}" data-action="buy">?곸슜</button>
        </div>
        <div class="trade-section">
          <span class="trade-label sell">留ㅻ룄</span>
          <input type="number" class="t-qty" placeholder="?섎웾" min="1">
          <input type="number" class="t-price" placeholder="留ㅻ룄媛">
          <button class="trade-btn sell-btn" data-idx="${idx}" data-action="sell">?곸슜</button>
        </div>
      </div>
      ${lastSellHtml}
      <div class="card-foot">
        <div class="foot-dates">
          <span>?깅줉: ${fmtDate(h.addedAt)}</span>
          <span>${h.lastUpdate ? '媛깆떊: '+fmtDate(h.lastUpdate) : '?꾩쭅 媛깆떊 ?덈맖'}</span>
        </div>
        <button data-remove="${idx}">??젣</button>
      </div>
    `;
    container.appendChild(card);
  });

  // ?꾩옱媛 / ?꾩씪媛 ?섎룞 ?낅젰
  container.querySelectorAll('input[data-field="current"], input[data-field="prev"]').forEach(inp=>{
    inp.addEventListener('change', async e=>{
      const idx = +e.target.dataset.idx, field = e.target.dataset.field, v = e.target.value;
      holdings[idx][field] = v==='' ? null : Number(v);
      holdings[idx].manual = true;
      holdings[idx].lastUpdate = Date.now();
      saveHoldings(); render();
    });
  });

  // 蹂댁쑀?섎웾 吏곸젒 ?섏젙
  container.querySelectorAll('input[data-field="qty"]').forEach(inp=>{
    inp.addEventListener('change', async e=>{
      const idx = +e.target.dataset.idx, v = e.target.value;
      holdings[idx].qty = v==='' ? 0 : Number(v);
      saveHoldings(); render();
    });
  });

  // 留ㅼ닔 / 留ㅻ룄
  container.querySelectorAll('button[data-action]').forEach(btn=>{
    btn.addEventListener('click', async e=>{
      const idx    = +e.target.dataset.idx;
      const action = e.target.dataset.action;
      const sec    = e.target.closest('.trade-section');
      const qty    = Number(sec.querySelector('.t-qty').value);
      const price  = Number(sec.querySelector('.t-price').value);
      if(!qty || qty <= 0 || !price || price <= 0){
        alert('?섎웾怨?媛寃⑹쓣 ?щ컮瑜닿쾶 ?낅젰?댁＜?몄슂.'); return;
      }
      if(action === 'buy') applyBuy(idx, qty, price);
      else                 applySell(idx, qty, price);
      sec.querySelector('.t-qty').value = '';
      sec.querySelector('.t-price').value = '';
      saveHoldings(); render();
    });
  });

  // ??젣
  container.querySelectorAll('button[data-remove]').forEach(btn=>{
    btn.addEventListener('click', async e=>{
      holdings.splice(+e.target.dataset.remove, 1);
      saveHoldings(); render();
    });
  });
}

// ---------- 醫낅ぉ 寃??----------
let selCode = '', selName = '';
let searchTimer = null;

document.getElementById('inSearch').addEventListener('input', e=>{
  clearTimeout(searchTimer);
  selCode = ''; selName = '';
  document.getElementById('addBtn').disabled = true;
  document.getElementById('selectedInfo').style.display = 'none';
  const q = e.target.value.trim();
  if(q.length < 1){ closeDD(); return; }
  searchTimer = setTimeout(()=> doSearch(q), 280);
});

async function doSearch(q){
  try{
    const url = `https://ac.finance.naver.com/ac?q=${encodeURIComponent(q)}&q_enc=UTF-8&t_koreng=1&st=111&r_format=json&r_enc=UTF-8&r_lt=111&r_unicode=0`;
    const res = await fetch(url);
    if(!res.ok) throw new Error();
    const data = await res.json();
    const items = (data.items || []).slice(0, 8).map(i=>({name:i[0], code:i[2]})).filter(i=>i.code);
    showDD(items);
  }catch(e){
    // CORS ???ㅽ뙣 ??吏곸젒 ?낅젰 ?덈궡
    showDD([], true);
  }
}

function showDD(items, corsBlocked=false){
  const dd = document.getElementById('searchDropdown');
  dd.innerHTML = '';
  if(corsBlocked){
    dd.innerHTML = `<li class="search-no-result">?먮룞寃??遺덇? ??醫낅ぉ肄붾뱶(6?먮━)瑜?吏곸젒 ?낅젰 ???좏깮?댁＜?몄슂<br><small style="color:#565C66">?먮뒗 濡쒖뺄 ?뚯씪濡??댁뼱蹂댁꽭??/small></li>`;
    // 吏곸젒 ?낅젰 肄붾뱶 泥섎━
    const searchInput = document.getElementById('inSearch').value.trim();
    if(/^\d{6}$/.test(searchInput)){
      const li = document.createElement('li');
      li.innerHTML = `<span>肄붾뱶 ${searchInput} 吏곸젒 ?ъ슜</span><span class="s-code">${searchInput}</span>`;
      li.addEventListener('click', ()=>{
        selCode = searchInput; selName = searchInput;
        selectStock(searchInput, searchInput);
      });
      dd.appendChild(li);
    }
    dd.classList.add('open'); return;
  }
  if(!items.length){ dd.classList.remove('open'); return; }
  items.forEach(item=>{
    const li = document.createElement('li');
    li.innerHTML = `<span>${item.name}</span><span class="s-code">${item.code}</span>`;
    li.addEventListener('click', ()=> selectStock(item.code, item.name));
    dd.appendChild(li);
  });
  dd.classList.add('open');
}
function closeDD(){ document.getElementById('searchDropdown').classList.remove('open'); }
document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) closeDD(); });

function selectStock(code, name){
  selCode = code; selName = name;
  document.getElementById('inSearch').value = `${name} (${code})`;
  document.getElementById('selectedLabel').textContent = `${name} 쨌 ${code}`;
  document.getElementById('selectedInfo').style.display = 'block';
  document.getElementById('addBtn').disabled = false;
  closeDD();
}

// ---------- 異붽? ----------
document.getElementById('addBtn').addEventListener('click', async ()=>{
  if(!selCode || !selName){ alert('醫낅ぉ??癒쇱? 寃?됲빐???좏깮?댁＜?몄슂.'); return; }
  const avg = document.getElementById('inAvg').value.trim();
  const qty = document.getElementById('inQty').value.trim();
  if(!avg || !qty){ alert('留ㅼ엯?됯퇏?④?? ?섎웾???낅젰?댁＜?몄슂.'); return; }
  holdings.push({
    code: selCode, name: selName,
    avg: Number(avg), qty: Number(qty),
    current: null, prev: null,
    manual: true, lastUpdate: null,
    addedAt: Date.now(),
    lastSell: null
  });
  saveHoldings(); render();
  document.getElementById('inSearch').value = '';
  document.getElementById('inAvg').value = '';
  document.getElementById('inQty').value = '';
  document.getElementById('selectedInfo').style.display = 'none';
  document.getElementById('addBtn').disabled = true;
  selCode = ''; selName = '';
  refreshAll();
});

// ---------- 내보내기 / 가져오기 ----------
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const json = JSON.stringify(holdings, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `positions_${date}.json`;
  a.click(); URL.revokeObjectURL(url);
});

document.getElementById('importFile').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error();
      if(holdings.length && !confirm(`현재 데이터(${holdings.length}개)를 덮어쓸까요?`)){
        e.target.value = ''; return;
      }
      holdings = data;
      holdings.forEach(h=>{ if(h.qty==null) h.qty=0; if(!h.addedAt) h.addedAt=Date.now(); });
      saveHoldings(); render();
    }catch{
      alert('올바른 JSON 파일이 아닙니다.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ---------- init ----------
loadHoldings();
refreshAll();
setInterval(refreshAll, REFRESH_MS);
</script>
