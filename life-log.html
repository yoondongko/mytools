<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라이프 로그</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f7;
      color: #1d1d1f;
    }
    header {
      background: white;
      padding: 14px 20px;
      border-bottom: 1px solid #e5e5ea;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header a { color: #007aff; text-decoration: none; font-size: 15px; }
    header h1 { font-size: 17px; font-weight: 600; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }

    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    /* Today summary */
    .status-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .status-cell { background: #f2f2f7; border-radius: 8px; padding: 10px 6px; text-align: center; }
    .status-cell .lbl { font-size: 11px; color: #8e8e93; margin-bottom: 4px; }
    .status-cell .val { font-size: 15px; font-weight: 600; }

    /* Medication */
    .med-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .med-chip { position: relative; display: inline-flex; }
    .med-btn {
      background: #e8f3ff;
      color: #007aff;
      border: none;
      border-radius: 20px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .med-btn:active { opacity: 0.7; }
    .med-del {
      position: absolute;
      top: -5px; right: -5px;
      width: 17px; height: 17px;
      background: #ff3b30;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 11px;
      cursor: pointer;
      line-height: 17px;
      text-align: center;
      padding: 0;
    }
    .add-med-btn {
      background: #f2f2f7;
      color: #8e8e93;
      border: none;
      border-radius: 20px;
      padding: 9px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    /* Charts */
    .tab-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .tab {
      background: #f2f2f7;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      color: #1d1d1f;
    }
    .tab.active { background: #007aff; color: white; font-weight: 500; }
    .chart-wrap { position: relative; height: 220px; }

    /* Log list */
    .log-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid #f2f2f7;
      font-size: 14px;
    }
    .log-row:last-child { border-bottom: none; }
    .log-meta { display: flex; align-items: center; gap: 8px; }
    .log-time-str { font-size: 12px; color: #8e8e93; }
    .del-btn { background: none; border: none; color: #ff3b30; font-size: 12px; cursor: pointer; }
    .empty-msg { font-size: 14px; color: #8e8e93; padding: 4px 0; }

    .dt-row { display: flex; gap: 8px; }
    .dt-row input {
      flex: 1;
      border: 1.5px solid #e5e5ea;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .dt-row input:focus { border-color: #007aff; }
    .now-btn { background: none; border: none; color: #007aff; font-size: 12px; font-weight: 500; cursor: pointer; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-header .card-title { margin-bottom: 0; }
    .del-btn { background: #fff0f0; border: none; color: #ff3b30; font-size: 12px; cursor: pointer; border-radius: 6px; padding: 3px 8px; }

    /* Todo */
    .todo-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .todo-add-row input {
      flex: 1;
      border: 1.5px solid #e5e5ea;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .todo-add-row input:focus { border-color: #007aff; }
    .todo-add-submit {
      background: #007aff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #f2f2f7;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-check {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }
    .todo-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
    }
    .todo-text.done {
      text-decoration: line-through;
      color: #c7c7cc;
    }
    .todo-del { background: none; border: none; color: #ff3b30; font-size: 12px; cursor: pointer; flex-shrink: 0; }

    /* Activity */
    .act-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .act-input-row { display: flex; align-items: center; gap: 8px; }
    .act-lbl { font-size: 13px; color: #8e8e93; width: 28px; flex-shrink: 0; }
    .act-input-row input { flex: 1; border: 1.5px solid #e5e5ea; border-radius: 8px; padding: 8px 10px; font-size: 14px; outline: none; font-family: inherit; }
    .act-input-row input:focus { border-color: #007aff; }
    .act-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .act-btn { background: #f2f2f7; border: none; border-radius: 20px; padding: 9px 14px; font-size: 14px; cursor: pointer; color: #1d1d1f; }
    .act-btn:active { opacity: 0.7; }

    /* Edit modal */
    #edit-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9000;
      padding: 20px;
    }
    #edit-overlay.open { display: flex; }
    #edit-box {
      background: white;
      border-radius: 14px;
      padding: 20px;
      width: 100%;
      max-width: 340px;
    }
    #edit-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .edit-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .edit-field label { font-size: 12px; color: #8e8e93; }
    .edit-field input, .edit-field select {
      border: 1.5px solid #e5e5ea;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      width: 100%;
    }
    .edit-field input:focus, .edit-field select:focus { border-color: #007aff; }
    .edit-field-row { display: flex; gap: 6px; }
    .edit-field-row input { flex: 1; }
    .edit-btns { display: flex; gap: 8px; margin-top: 4px; }
    .edit-btns button { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #edit-cancel { background: #f2f2f7; color: #1d1d1f; }
    #edit-save   { background: #007aff; color: white; }

    #auth-overlay {
      position: fixed; inset: 0;
      background: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #auth-box {
      background: white;
      border-radius: 16px;
      padding: 32px 28px;
      width: 280px;
      text-align: center;
    }
    #auth-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    #auth-box p { font-size: 13px; color: #8e8e93; margin-bottom: 20px; }
    #auth-input {
      width: 100%;
      border: 1.5px solid #e5e5ea;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 18px;
      letter-spacing: 6px;
      text-align: center;
      outline: none;
      margin-bottom: 12px;
    }
    #auth-input:focus { border-color: #007aff; }
    #auth-confirm {
      width: 100%;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    #auth-err { font-size: 13px; color: #ff3b30; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>

<div id="edit-overlay">
  <div id="edit-box">
    <h3 id="edit-title">기록 수정</h3>
    <div id="edit-fields"></div>
    <div class="edit-btns">
      <button id="edit-cancel" onclick="closeEditModal()">취소</button>
      <button id="edit-save"   onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div id="auth-overlay">
  <div id="auth-box">
    <h2>라이프 로그</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="auth-input" maxlength="20" onkeydown="if(event.key==='Enter')checkAuth()">
    <button id="auth-confirm" onclick="checkAuth()">확인</button>
    <div id="auth-err"></div>
  </div>
</div>

<header>
  <a href="index.html">← 홈</a>
  <h1>라이프 로그</h1>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">오늘</div>
    <div class="status-row">
      <div class="status-cell"><div class="lbl">취침</div><div class="val" id="s-start">—</div></div>
      <div class="status-cell"><div class="lbl">기상</div><div class="val" id="s-end">—</div></div>
      <div class="status-cell"><div class="lbl">수면</div><div class="val" id="s-dur">—</div></div>
      <div class="status-cell"><div class="lbl">복약</div><div class="val" id="s-med">0</div></div>
      <div class="status-cell"><div class="lbl">할일</div><div class="val" id="s-todo">0</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">약</div>
      <button class="now-btn" onclick="setNow()">지금으로</button>
    </div>
    <div class="dt-row" style="margin-bottom:12px;">
      <input type="date" id="log-date">
      <input type="time" id="log-time" step="300">
    </div>
    <div class="med-row" id="med-row"></div>
  </div>

  <div class="card">
    <div class="card-title">할일</div>
    <div class="todo-add-row">
      <input type="text" id="todo-input" placeholder="할일 입력" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="todo-add-submit" onclick="addTodo()">추가</button>
    </div>
    <div id="todo-list"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">시간 기록</div>
      <button class="now-btn" onclick="setActNow()">지금으로</button>
    </div>
    <div class="act-inputs">
      <div class="act-input-row">
        <span class="act-lbl">시작</span>
        <input type="date" id="act-start-date">
        <input type="time" id="act-start-time" step="300">
      </div>
      <div class="act-input-row">
        <span class="act-lbl">종료</span>
        <input type="date" id="act-end-date">
        <input type="time" id="act-end-time" step="300">
      </div>
      <div class="act-input-row">
        <span class="act-lbl">내용</span>
        <input type="text" id="act-content" placeholder="메모 (선택)" style="border-radius:8px;">
      </div>
    </div>
    <div class="act-btns">
      <button class="act-btn" onclick="logActivity('공부')">📚 공부</button>
      <button class="act-btn" onclick="logActivity('자기계발')">🌱 자기계발</button>
      <button class="act-btn" onclick="logActivity('생활')">🏠 생활</button>
      <button class="act-btn" onclick="logActivity('가족')">👨‍👩‍👧 가족</button>
      <button class="act-btn" onclick="logActivity('취업준비')">💼 취업준비</button>
      <button class="act-btn" onclick="logActivity('기타')">⭐ 기타</button>
      <button class="act-btn" onclick="logSleepBlock()" style="background:#e8edf2; color:#4e6880; font-weight:600;">😴 취침</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">그래프</div>
    <div class="tab-row">
      <button class="tab active" data-chart="duration" onclick="switchChart('duration')">수면 시간</button>
      <button class="tab" data-chart="timing" onclick="switchChart('timing')">수면 타이밍</button>
      <button class="tab" data-chart="med" onclick="switchChart('med')">복약 타이밍</button>
      <button class="tab" data-chart="activity" onclick="switchChart('activity')">시간 분석</button>
      <button class="tab" data-chart="report" onclick="switchChart('report')">종합 리포트</button>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div id="report-wrap" style="display:none;"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title" style="cursor:pointer;" onclick="toggleLogCollapse()">최근 기록 <span id="log-toggle-icon">▾</span></div>
      <button class="now-btn" style="color:#ff3b30;" onclick="clearAllLogs()">전체 삭제</button>
    </div>
    <div id="log-items"></div>
  </div>

  <div class="card">
    <div class="card-title">데이터</div>
    <div style="display:flex; gap:8px;">
      <button class="add-med-btn" style="flex:1; border-radius:8px; padding:10px;" onclick="exportData()">⬇ 내보내기</button>
      <label class="add-med-btn" style="flex:1; border-radius:8px; padding:10px; text-align:center; cursor:pointer;">
        ⬆ 불러오기
        <input type="file" accept=".json" style="display:none;" onchange="importData(event)">
      </label>
    </div>
  </div>

</div>

<script>
(function () {
  if (sessionStorage.getItem('lifeLogAuth') === '1') {
    document.getElementById('auth-overlay').style.display = 'none';
  } else {
    document.getElementById('auth-input').focus();
  }
})();

function checkAuth() {
  if (document.getElementById('auth-input').value === '1029') {
    sessionStorage.setItem('lifeLogAuth', '1');
    document.getElementById('auth-overlay').style.display = 'none';
  } else {
    document.getElementById('auth-err').textContent = '비밀번호가 틀렸습니다';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
}

const KEY = 'lifeLog_v1';
let chartInst = null;
let activeChart = 'duration';

// ── Data ──────────────────────────────────────────────────────────

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    const d = raw ? JSON.parse(raw) : {};
    if (!d.medNames) d.medNames = [];
    if (!d.logs) d.logs = [];
    if (!d.todos) d.todos = [];
    return d;
  } catch { return { medNames: [], logs: [], todos: [] }; }
}

function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

// ── Helpers ───────────────────────────────────────────────────────

function fmtTime(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function toHour(iso) {
  const d = new Date(iso);
  return d.getHours() + d.getMinutes() / 60;
}

function isToday(iso) {
  const d = new Date(iso), t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function last14Days() {
  return Array.from({ length: 14 }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (13 - i));
    return `${d.getMonth()+1}/${d.getDate()}`;
  });
}

function getSessions(logs) {
  const sessions = [];
  let pending = null;
  for (const l of logs) {
    if (l.type === 'sleep_start') {
      pending = l;
    } else if (l.type === 'sleep_end' && pending) {
      sessions.push({ start: pending.ts, end: l.ts });
      pending = null;
    }
  }
  if (pending) sessions.push({ start: pending.ts, end: null });
  return sessions;
}

// ── Actions ───────────────────────────────────────────────────────

const ACT_CATEGORIES = ['공부', '자기계발', '생활', '가족', '취업준비', '기타'];
const ACT_COLORS     = ['#a8d85a', '#f5d020', '#5bb3f0', '#c5a8e8', '#f472b6', '#90abc0'];
// 공부=연두, 자기계발=개나리, 생활=밝은블루, 가족=연보라, 취업준비=핑크, 기타=스카이블루그레이
const ACT_EMOJI      = { '공부':'📚', '자기계발':'🌱', '생활':'🏠', '가족':'👨‍👩‍👧', '취업준비':'💼', '기타':'⭐' };

function setNow() {
  const now = new Date();
  document.getElementById('log-date').value = now.toISOString().slice(0, 10);
  document.getElementById('log-time').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function getLogTs() {
  const date = document.getElementById('log-date').value;
  const time = document.getElementById('log-time').value;
  if (!date || !time) return new Date().toISOString();
  return new Date(`${date}T${time}`).toISOString();
}

function logMed(name) {
  const data = load();
  data.logs.push({ id: String(Date.now()), type: 'med', name, ts: getLogTs() });
  data.logs.sort((a, b) => new Date(a.ts) - new Date(b.ts));
  save(data);
  render();
}

function setActNow() {
  const now = new Date();
  const d = now.toISOString().slice(0, 10);
  const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('act-start-date').value = d;
  document.getElementById('act-start-time').value = t;
  document.getElementById('act-end-date').value = d;
  document.getElementById('act-end-time').value = t;
}

function logActivity(category) {
  const sd = document.getElementById('act-start-date').value;
  const st = document.getElementById('act-start-time').value;
  const ed = document.getElementById('act-end-date').value;
  const et = document.getElementById('act-end-time').value;
  if (!sd || !st || !ed || !et) { alert('시작/종료 시각을 모두 입력해주세요'); return; }
  const startTs = new Date(`${sd}T${st}`).toISOString();
  const endTs   = new Date(`${ed}T${et}`).toISOString();
  if (new Date(endTs) <= new Date(startTs)) { alert('종료 시각이 시작 시각보다 늦어야 합니다'); return; }
  const content = document.getElementById('act-content').value.trim();
  const data = load();
  data.logs.push({ id: String(Date.now()), type: 'activity', category, ts: startTs, endTs, content });
  data.logs.sort((a, b) => new Date(a.ts) - new Date(b.ts));
  save(data);
  document.getElementById('act-content').value = '';
  render();
}

function logSleepBlock() {
  const sd = document.getElementById('act-start-date').value;
  const st = document.getElementById('act-start-time').value;
  const ed = document.getElementById('act-end-date').value;
  const et = document.getElementById('act-end-time').value;
  if (!sd || !st || !ed || !et) { alert('시작/종료 시각을 모두 입력해주세요'); return; }
  const startTs = new Date(`${sd}T${st}`).toISOString();
  const endTs   = new Date(`${ed}T${et}`).toISOString();
  if (new Date(endTs) <= new Date(startTs)) { alert('종료 시각이 시작 시각보다 늦어야 합니다'); return; }
  const data = load();
  const base = Date.now();
  data.logs.push({ id: String(base),     type: 'sleep_start', ts: startTs });
  data.logs.push({ id: String(base + 1), type: 'sleep_end',   ts: endTs });
  data.logs.sort((a, b) => new Date(a.ts) - new Date(b.ts));
  save(data);
  render();
}

function addTodo() {
  const input = document.getElementById('todo-input');
  const text = input.value.trim();
  if (!text) return;
  const data = load();
  data.todos.push({ id: String(Date.now()), text, done: false });
  save(data);
  input.value = '';
  renderTodos(data);
}

function toggleTodo(id) {
  const data = load();
  const t = data.todos.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) {
    data.logs.push({ id: String(Date.now()), type: 'todo', text: t.text, ts: new Date().toISOString() });
    data.logs.sort((a, b) => new Date(a.ts) - new Date(b.ts));
  }
  save(data);
  render();
}

function deleteTodo(id) {
  const data = load();
  data.todos = data.todos.filter(t => t.id !== id);
  save(data);
  renderTodos(data);
}

let logCollapsed = false;

function toggleLogCollapse() {
  logCollapsed = !logCollapsed;
  document.getElementById('log-items').style.display = logCollapsed ? 'none' : '';
  document.getElementById('log-toggle-icon').textContent = logCollapsed ? '▸' : '▾';
}

function clearAllLogs() {
  if (!confirm('모든 기록을 삭제할까요?')) return;
  const data = load();
  data.logs = [];
  save(data);
  render();
}

function addMedName() {
  const name = prompt('약 이름을 입력하세요:');
  if (!name || !name.trim()) return;
  const data = load();
  const t = name.trim();
  if (!data.medNames.includes(t)) { data.medNames.push(t); save(data); }
  render();
}

function removeMedName(name) {
  if (!confirm(`"${name}" 버튼을 삭제할까요?\n(복약 이력은 유지됩니다)`)) return;
  const data = load();
  data.medNames = data.medNames.filter(n => n !== name);
  save(data);
  render();
}

let editingId = null;

function openEditModal(id) {
  const data = load();
  const l = data.logs.find(l => l.id === id);
  if (!l) return;
  editingId = id;

  const tsDate = l.ts.slice(0, 10);
  const tsTime = l.ts.slice(11, 16);

  const titles = { med: '복약 수정', sleep_start: '취침 시각 수정', sleep_end: '기상 시각 수정', activity: '시간 기록 수정', todo: '할일 완료 수정' };
  document.getElementById('edit-title').textContent = titles[l.type] || '기록 수정';

  let html = '';
  if (l.type === 'med') {
    html = `
      <div class="edit-field"><label>약 이름</label><input id="ef-name" value="${l.name}"></div>
      <div class="edit-field"><label>시각</label><div class="edit-field-row">
        <input type="date" id="ef-date" value="${tsDate}">
        <input type="time" id="ef-time" step="300" value="${tsTime}">
      </div></div>`;
  } else if (l.type === 'sleep_start' || l.type === 'sleep_end') {
    html = `
      <div class="edit-field"><label>시각</label><div class="edit-field-row">
        <input type="date" id="ef-date" value="${tsDate}">
        <input type="time" id="ef-time" value="${tsTime}">
      </div></div>`;
  } else if (l.type === 'activity') {
    const edDate = l.endTs.slice(0, 10);
    const edTime = l.endTs.slice(11, 16);
    const cats = ['공부','자기계발','생활','가족','취업준비','기타'];
    html = `
      <div class="edit-field"><label>카테고리</label>
        <select id="ef-cat">${cats.map(c => `<option${c === l.category ? ' selected' : ''}>${c}</option>`).join('')}</select>
      </div>
      <div class="edit-field"><label>시작</label><div class="edit-field-row">
        <input type="date" id="ef-date" value="${tsDate}">
        <input type="time" id="ef-time" step="300" value="${tsTime}">
      </div></div>
      <div class="edit-field"><label>종료</label><div class="edit-field-row">
        <input type="date" id="ef-edate" value="${edDate}">
        <input type="time" id="ef-etime" step="300" value="${edTime}">
      </div></div>
      <div class="edit-field"><label>내용</label><input id="ef-content" value="${l.content || ''}"></div>`;
  } else if (l.type === 'todo') {
    html = `
      <div class="edit-field"><label>할일</label><input id="ef-text" value="${l.text}"></div>
      <div class="edit-field"><label>완료 시각</label><div class="edit-field-row">
        <input type="date" id="ef-date" value="${tsDate}">
        <input type="time" id="ef-time" value="${tsTime}">
      </div></div>`;
  }
  document.getElementById('edit-fields').innerHTML = html;
  document.getElementById('edit-overlay').classList.add('open');
}

function closeEditModal() {
  editingId = null;
  document.getElementById('edit-overlay').classList.remove('open');
}

function saveEdit() {
  if (!editingId) return;
  const data = load();
  const l = data.logs.find(l => l.id === editingId);
  if (!l) return;

  const getVal = id => { const el = document.getElementById(id); return el ? el.value : ''; };

  const buildTs = (dateId, timeId) => {
    const d = getVal(dateId), t = getVal(timeId);
    return d && t ? new Date(`${d}T${t}`).toISOString() : l.ts;
  };

  if (l.type === 'med') {
    l.name = getVal('ef-name') || l.name;
    l.ts = buildTs('ef-date', 'ef-time');
  } else if (l.type === 'sleep_start' || l.type === 'sleep_end') {
    l.ts = buildTs('ef-date', 'ef-time');
  } else if (l.type === 'activity') {
    l.category = getVal('ef-cat') || l.category;
    l.ts    = buildTs('ef-date',  'ef-time');
    l.endTs = buildTs('ef-edate', 'ef-etime');
    l.content = getVal('ef-content');
  } else if (l.type === 'todo') {
    l.text = getVal('ef-text') || l.text;
    l.ts = buildTs('ef-date', 'ef-time');
  }

  data.logs.sort((a, b) => new Date(a.ts) - new Date(b.ts));
  save(data);
  closeEditModal();
  render();
}

function deleteLog(id) {
  const data = load();
  data.logs = data.logs.filter(l => l.id !== id);
  save(data);
  render();
}

function switchChart(type) {
  activeChart = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.chart === type));
  renderChart(load());
}

// ── Render ────────────────────────────────────────────────────────

function render() {
  const data = load();
  renderSummary(data);
  renderMedRow(data);
  renderTodos(data);
  renderChart(data);
  renderLogs(data);
}

function renderSummary(data) {
  const sessions = getSessions(data.logs);
  const today = new Date();
  let todaySess = null;
  for (let i = sessions.length - 1; i >= 0; i--) {
    const s = sessions[i];
    const endD = s.end ? new Date(s.end) : today;
    const startD = new Date(s.start);
    if (endD.toDateString() === today.toDateString() || startD.toDateString() === today.toDateString()) {
      todaySess = s; break;
    }
  }

  if (todaySess) {
    document.getElementById('s-start').textContent = fmtTime(todaySess.start);
    if (todaySess.end) {
      document.getElementById('s-end').textContent = fmtTime(todaySess.end);
      const h = (new Date(todaySess.end) - new Date(todaySess.start)) / 3600000;
      document.getElementById('s-dur').textContent = h.toFixed(1) + 'h';
    } else {
      document.getElementById('s-end').textContent = '취침중';
      document.getElementById('s-dur').textContent = '—';
    }
  } else {
    ['s-start','s-end','s-dur'].forEach(id => document.getElementById(id).textContent = '—');
  }

  const cnt = data.logs.filter(l => l.type === 'med' && isToday(l.ts)).length;
  document.getElementById('s-med').textContent = String(cnt);
  const todoCnt = data.logs.filter(l => l.type === 'todo' && isToday(l.ts)).length;
  document.getElementById('s-todo').textContent = String(todoCnt);
}

function renderTodos(data) {
  const el = document.getElementById('todo-list');
  if (!data.todos.length) {
    el.innerHTML = '<div class="empty-msg">할일이 없습니다</div>';
    return;
  }
  el.innerHTML = data.todos.map(t => `
    <div class="todo-item">
      <button class="todo-check" onclick="toggleTodo('${t.id}')">${t.done ? '✅' : '⬜'}</button>
      <span class="todo-text${t.done ? ' done' : ''}">${t.text}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">삭제</button>
    </div>`).join('');
}

function renderMedRow(data) {
  const row = document.getElementById('med-row');
  row.innerHTML = '';

  data.medNames.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'med-chip';

    const btn = document.createElement('button');
    btn.className = 'med-btn';
    btn.textContent = `💊 ${name}`;
    btn.onclick = () => logMed(name);

    const del = document.createElement('button');
    del.className = 'med-del';
    del.textContent = '×';
    del.title = '버튼 삭제';
    del.onclick = e => { e.stopPropagation(); removeMedName(name); };

    chip.appendChild(btn);
    chip.appendChild(del);
    row.appendChild(chip);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-med-btn';
  addBtn.textContent = '+ 추가';
  addBtn.onclick = addMedName;
  row.appendChild(addBtn);
}

function renderLogs(data) {
  const el = document.getElementById('log-items');
  el.style.display = logCollapsed ? 'none' : '';
  const recent = [...data.logs].reverse().slice(0, 30);
  if (!recent.length) {
    el.innerHTML = '<div class="empty-msg">기록이 없습니다</div>';
    return;
  }
  el.innerHTML = recent.map(l => {
    let label, timeStr;
    if (l.type === 'med') {
      label = `💊 ${l.name}`;
      timeStr = `${fmtDate(l.ts)} ${fmtTime(l.ts)}`;
    } else if (l.type === 'sleep_start') {
      label = '😴 취침';
      timeStr = `${fmtDate(l.ts)} ${fmtTime(l.ts)}`;
    } else if (l.type === 'sleep_end') {
      label = '☀️ 기상';
      timeStr = `${fmtDate(l.ts)} ${fmtTime(l.ts)}`;
    } else if (l.type === 'activity') {
      const dur = ((new Date(l.endTs) - new Date(l.ts)) / 3600000).toFixed(1);
      label = `${ACT_EMOJI[l.category] || '⏱'} ${l.category}${l.content ? ' · ' + l.content : ''} (${dur}h)`;
      timeStr = `${fmtDate(l.ts)} ${fmtTime(l.ts)}–${fmtTime(l.endTs)}`;
    } else if (l.type === 'todo') {
      label = `✅ ${l.text}`;
      timeStr = `${fmtDate(l.ts)} ${fmtTime(l.ts)}`;
    }
    return `<div class="log-row">
      <span style="flex:1; margin-right:8px;">${label}</span>
      <span class="log-meta">
        <span class="log-time-str">${timeStr}</span>
        <button class="del-btn" style="background:#e8f3ff; color:#007aff; margin-right:4px;" onclick="openEditModal('${l.id}')">수정</button>
        <button class="del-btn" onclick="deleteLog('${l.id}')">삭제</button>
      </span>
    </div>`;
  }).join('');
}

// ── Charts ────────────────────────────────────────────────────────

function renderChart(data) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  document.getElementById('chart').style.display = activeChart === 'report' ? 'none' : 'block';
  document.getElementById('report-wrap').style.display = activeChart === 'report' ? 'block' : 'none';
  if (activeChart === 'report') { renderReport(data); return; }
  const ctx = document.getElementById('chart').getContext('2d');
  const days = last14Days();

  if (activeChart === 'duration') {
    const sessions = getSessions(data.logs);
    const durByDay = {};
    sessions.forEach(s => {
      if (!s.end) return;
      const key = fmtDate(s.end);
      if (days.includes(key)) {
        durByDay[key] = (durByDay[key] || 0) + (new Date(s.end) - new Date(s.start)) / 3600000;
      }
    });

    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: days,
        datasets: [{
          label: '수면 시간 (h)',
          data: days.map(d => durByDay[d] != null ? +durByDay[d].toFixed(2) : null),
          backgroundColor: '#4e6880',
          borderRadius: 5,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, max: 14, ticks: { callback: v => v + 'h' } }
        }
      }
    });

  } else if (activeChart === 'timing') {
    const sessions = getSessions(data.logs);
    const dayIdx = Object.fromEntries(days.map((d, i) => [d, i]));
    const sleepPts = [], wakePts = [];

    sessions.forEach(s => {
      const si = dayIdx[fmtDate(s.start)];
      if (si != null) sleepPts.push({ x: si, y: toHour(s.start) });
      if (s.end) {
        const ei = dayIdx[fmtDate(s.end)];
        if (ei != null) wakePts.push({ x: ei, y: toHour(s.end) });
      }
    });

    chartInst = new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [
          { label: '취침', data: sleepPts, backgroundColor: '#4e6880', pointRadius: 7 },
          { label: '기상', data: wakePts, backgroundColor: '#7898ae', pointRadius: 7 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { type: 'linear', min: -0.5, max: 13.5, ticks: { stepSize: 1, callback: v => days[Math.round(v)] || '' } },
          y: { min: 0, max: 24, ticks: { stepSize: 3, callback: v => `${String(v).padStart(2,'0')}:00` } }
        }
      }
    });

  } else if (activeChart === 'activity') {
    const acts = data.logs.filter(l => l.type === 'activity');
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: days,
        datasets: ACT_CATEGORIES.map((cat, ci) => ({
          label: cat,
          data: days.map(day => {
            const total = acts
              .filter(l => l.category === cat && fmtDate(l.ts) === day)
              .reduce((s, l) => s + (new Date(l.endTs) - new Date(l.ts)) / 3600000, 0);
            return total > 0 ? +total.toFixed(2) : null;
          }),
          backgroundColor: ACT_COLORS[ci],
          borderRadius: 3,
          stack: 'act',
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { stacked: true },
          y: { stacked: true, beginAtZero: true, ticks: { callback: v => v + 'h' } }
        }
      }
    });

  } else {
    const COLORS = ['#7898ae','#a0b8c8','#5e8fa8','#6ba0b8','#8ab0c4','#90abc0'];
    const dayIdx = Object.fromEntries(days.map((d, i) => [d, i]));
    const allNames = [...new Set(data.logs.filter(l => l.type === 'med').map(l => l.name))];

    const datasets = allNames.map((name, ci) => ({
      label: name,
      data: data.logs
        .filter(l => l.type === 'med' && l.name === name)
        .map(l => { const xi = dayIdx[fmtDate(l.ts)]; return xi != null ? { x: xi, y: toHour(l.ts) } : null; })
        .filter(Boolean),
      backgroundColor: COLORS[ci % COLORS.length],
      pointRadius: 8,
    }));

    chartInst = new Chart(ctx, {
      type: 'scatter',
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { type: 'linear', min: -0.5, max: 13.5, ticks: { stepSize: 1, callback: v => days[Math.round(v)] || '' } },
          y: { min: 0, max: 24, ticks: { stepSize: 3, callback: v => `${String(v).padStart(2,'0')}:00` } }
        }
      }
    });
  }
}

function renderReport(data) {
  const wrap = document.getElementById('report-wrap');
  const days = last14Days();
  const sessions = getSessions(data.logs);
  const acts = data.logs.filter(l => l.type === 'activity');

  // 평균 수면 시간
  const sleepHours = days.map(day => {
    const s = sessions.find(s => s.end && fmtDate(s.end) === day);
    return s ? (new Date(s.end) - new Date(s.start)) / 3600000 : 0;
  }).filter(h => h > 0);
  const avgSleep = sleepHours.length ? (sleepHours.reduce((a,b)=>a+b,0)/sleepHours.length).toFixed(1) : '—';

  // 카테고리별 14일 합계
  const catTotals = ACT_CATEGORIES.map(cat => {
    const total = acts.filter(l => l.category === cat)
      .reduce((s, l) => s + (new Date(l.endTs) - new Date(l.ts)) / 3600000, 0);
    return { cat, total };
  });
  const grandTotal = catTotals.reduce((s, c) => s + c.total, 0);

  // 최근 7일 활동 비중
  const last7 = days.slice(-7);
  const cat7Totals = ACT_CATEGORIES.map((cat, ci) => {
    const total = acts
      .filter(l => l.category === cat && last7.includes(fmtDate(l.ts)))
      .reduce((s, l) => s + (new Date(l.endTs) - new Date(l.ts)) / 3600000, 0);
    return { cat, total, color: ACT_COLORS[ci] };
  }).filter(c => c.total > 0);

  wrap.innerHTML = `
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;">
      <div style="background:#eef1f5; border-radius:8px; padding:12px; text-align:center; border-left:4px solid #4e6880;">
        <div style="font-size:11px; color:#8e8e93; margin-bottom:4px;">평균 수면</div>
        <div style="font-size:22px; font-weight:700; color:#4e6880;">${avgSleep}<span style="font-size:13px; color:#8e8e93;">h</span></div>
      </div>
      <div style="background:#f2f2f7; border-radius:8px; padding:12px; text-align:center;">
        <div style="font-size:11px; color:#8e8e93; margin-bottom:4px;">14일 활동 합계</div>
        <div style="font-size:22px; font-weight:700;">${grandTotal.toFixed(1)}<span style="font-size:13px; color:#8e8e93;">h</span></div>
      </div>
    </div>
    <div style="font-size:12px; color:#8e8e93; margin-bottom:8px; font-weight:600; letter-spacing:0.5px;">카테고리별 합계 (14일)</div>
    ${catTotals.map((c, i) => `
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
        <span style="width:70px; font-size:13px;">${ACT_EMOJI[c.cat]} ${c.cat}</span>
        <div style="flex:1; background:#f2f2f7; border-radius:4px; height:10px; overflow:hidden;">
          <div style="height:100%; width:${grandTotal>0?(c.total/grandTotal*100).toFixed(1):0}%; background:${ACT_COLORS[i]}; border-radius:4px;"></div>
        </div>
        <span style="font-size:13px; font-weight:600; width:36px; text-align:right;">${c.total.toFixed(1)}h</span>
      </div>`).join('')}
    ${cat7Totals.length ? `
      <div style="font-size:12px; color:#8e8e93; margin-top:12px; margin-bottom:8px; font-weight:600; letter-spacing:0.5px;">최근 7일 비중</div>
      <div style="position:relative; height:130px;"><canvas id="pie-chart"></canvas></div>` : ''}
  `;

  if (cat7Totals.length) {
    new Chart(document.getElementById('pie-chart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: cat7Totals.map(c => c.cat),
        datasets: [{ data: cat7Totals.map(c => +c.total.toFixed(2)), backgroundColor: cat7Totals.map(c => c.color), borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { font: { size: 12 }, padding: 8, boxWidth: 12 } } }
      }
    });
  }
}

function exportData() {
  const data = load();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lifelog-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.logs || !imported.medNames) throw new Error();
      const current = load();
      const existingIds = new Set(current.logs.map(l => l.id));
      const merged = {
        medNames: [...new Set([...current.medNames, ...imported.medNames])],
        logs: [...current.logs, ...imported.logs.filter(l => !existingIds.has(l.id))]
          .sort((a, b) => new Date(a.ts) - new Date(b.ts))
      };
      save(merged);
      render();
      alert(`불러오기 완료: 로그 ${imported.logs.length}개 병합됨`);
    } catch {
      alert('올바른 라이프 로그 파일이 아닙니다');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

document.getElementById('edit-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-overlay')) closeEditModal();
});

setNow();
setActNow();
render();
</script>
