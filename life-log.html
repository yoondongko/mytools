<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>라이프 로그</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f2f2f7; color: #1d1d1f; }
    header {
      background: white; padding: 14px 20px; border-bottom: 1px solid #e5e5ea;
      display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10;
    }
    header a { color: #007aff; text-decoration: none; font-size: 15px; }
    header h1 { font-size: 17px; font-weight: 600; }
    .container { max-width: 600px; margin: 0 auto; padding: 16px; }

    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-header .card-title { margin-bottom: 0; }

    /* Today */
    .today-datetime { font-size: 12px; color: #8e8e93; text-align: right; margin-bottom: 10px; }
    .status-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .status-cell { background: #f2f2f7; border-radius: 8px; padding: 10px 6px; text-align: center; }
    .status-cell .lbl { font-size: 11px; color: #8e8e93; margin-bottom: 4px; }
    .status-cell .val { font-size: 15px; font-weight: 600; }

    /* Medication */
    .med-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .med-chip { position: relative; display: inline-flex; }
    .med-btn { background: #e8f3ff; color: #007aff; border: none; border-radius: 20px; padding: 9px 16px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .med-btn:active { opacity: 0.7; }
    .add-med-btn { background: #f2f2f7; color: #8e8e93; border: none; border-radius: 20px; padding: 9px 16px; font-size: 14px; cursor: pointer; }

    /* Charts */
    .chart-tab-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .tab { background: #f2f2f7; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #1d1d1f; }
    .tab.active { background: #007aff; color: white; font-weight: 500; }
    .period-row { display: flex; gap: 5px; margin-bottom: 12px; }
    .period-btn { background: #f2f2f7; border: none; border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: #8e8e93; }
    .period-btn.active { background: #4e6880; color: white; font-weight: 500; }
    .chart-wrap { position: relative; height: 220px; }

    /* Log list */
    .log-filter-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .log-filter-btn { background: #f2f2f7; border: none; border-radius: 14px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #1d1d1f; }
    .log-filter-btn.active { background: #007aff; color: white; }
    .log-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #f2f2f7; font-size: 14px; }
    .log-row:last-child { border-bottom: none; }
    .log-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .log-time-str { font-size: 12px; color: #8e8e93; }
    .now-btn { background: none; border: none; color: #007aff; font-size: 12px; font-weight: 500; cursor: pointer; }
    .del-btn { background: #fff0f0; border: none; color: #ff3b30; font-size: 12px; cursor: pointer; border-radius: 6px; padding: 3px 8px; }
    .edit-log-btn { background: #e8f3ff; border: none; color: #007aff; font-size: 12px; cursor: pointer; border-radius: 6px; padding: 3px 8px; }
    .empty-msg { font-size: 14px; color: #8e8e93; padding: 4px 0; }

    .dt-row { display: flex; gap: 8px; }
    .dt-row input { flex: 1; border: 1.5px solid #e5e5ea; border-radius: 8px; padding: 9px 10px; font-size: 14px; outline: none; font-family: inherit; }
    .dt-row input:focus { border-color: #007aff; }

    /* Todo */
    .todo-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .todo-add-row input { flex: 1; border: 1.5px solid #e5e5ea; border-radius: 8px; padding: 9px 10px; font-size: 14px; outline: none; font-family: inherit; }
    .todo-add-row input:focus { border-color: #007aff; }
    .todo-add-submit { background: #007aff; color: white; border: none; border-radius: 8px; padding: 9px 14px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .todo-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f2f2f7; }
    .todo-item:last-child { border-bottom: none; }
    .todo-check { background: none; border: none; font-size: 20px; cursor: pointer; line-height: 1; padding: 0; flex-shrink: 0; }
    .todo-text { flex: 1; font-size: 14px; line-height: 1.4; }
    .todo-text.done { text-decoration: line-through; color: #c7c7cc; }

    /* Activity */
    .act-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .act-input-row { display: flex; align-items: center; gap: 8px; }
    .act-lbl { font-size: 13px; color: #8e8e93; width: 28px; flex-shrink: 0; }
    .act-input-row input { flex: 1; border: 1.5px solid #e5e5ea; border-radius: 8px; padding: 8px 10px; font-size: 14px; outline: none; font-family: inherit; }
    .act-input-row input:focus { border-color: #007aff; }
    .act-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .act-btn { background: #f2f2f7; border: none; border-radius: 20px; padding: 9px 14px; font-size: 14px; cursor: pointer; color: #1d1d1f; }
    .act-btn:active { opacity: 0.7; }

    /* Edit modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    #edit-overlay { z-index: 9200; }
    #manage-overlay { z-index: 9100; }
    #todo-time-overlay { z-index: 9300; }
    .modal-box {
      background: white; border-radius: 14px; padding: 20px;
      width: 100%; max-width: 340px; max-height: 82vh; overflow-y: auto;
    }
    .modal-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .edit-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .edit-field label { font-size: 12px; color: #8e8e93; }
    .edit-field input, .edit-field select {
      border: 1.5px solid #e5e5ea; border-radius: 8px; padding: 9px 10px;
      font-size: 14px; outline: none; font-family: inherit; width: 100%;
    }
    .edit-field input:focus, .edit-field select:focus { border-color: #007aff; }
    .edit-field-row { display: flex; gap: 6px; }
    .edit-field-row input { flex: 1; }
    .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
    .modal-btns button { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-cancel { background: #f2f2f7; color: #1d1d1f; }
    .btn-primary { background: #007aff; color: white; }
    .btn-close { width: 100%; margin-top: 10px; padding: 11px; background: #f2f2f7; color: #1d1d1f; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }

    /* Manage modal list */
    .manage-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid #f2f2f7; }
    .manage-item:last-child { border-bottom: none; }
    .manage-item-label { flex: 1; font-size: 14px; }
    .manage-color { width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; padding: 2px; background: none; flex-shrink: 0; }
    .manage-del-btn { background: #fff0f0; border: none; color: #ff3b30; font-size: 12px; cursor: pointer; border-radius: 6px; padding: 3px 8px; flex-shrink: 0; }
    .manage-add-row { display: flex; gap: 6px; margin-top: 12px; }
    .manage-add-row input { flex: 1; border: 1.5px solid #e5e5ea; border-radius: 8px; padding: 8px 10px; font-size: 14px; outline: none; font-family: inherit; }
    .manage-add-row input:focus { border-color: #007aff; }
    .manage-add-submit { background: #007aff; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer; }

    /* Mood card */
    .mood-emoji-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .mood-emoji-btn { background: none; border: 2px solid #e5e5ea; border-radius: 50%; width: 44px; height: 44px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mood-emoji-btn.selected { border-color: #007aff; background: #e8f3ff; }
    .mood-memo { width: 100%; border: 1.5px solid #e5e5ea; border-radius: 8px; padding: 9px 10px; font-size: 14px; outline: none; font-family: inherit; resize: none; }
    .mood-memo:focus { border-color: #007aff; }
    .mood-save-btn { background: #007aff; color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    /* Year nav */
    .year-nav { display: none; align-items: center; gap: 8px; margin-left: auto; font-size: 13px; font-weight: 600; color: #1d1d1f; }
    .year-nav.show { display: flex; }
    .year-nav button { background: #f2f2f7; border: none; border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer; color: #4e6880; }

    /* Auth */
    #auth-overlay { position: fixed; inset: 0; background: #f2f2f7; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    #auth-box { background: white; border-radius: 16px; padding: 32px 28px; width: 280px; text-align: center; }
    #auth-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    #auth-box p { font-size: 13px; color: #8e8e93; margin-bottom: 20px; }
    #auth-input { width: 100%; border: 1.5px solid #e5e5ea; border-radius: 10px; padding: 12px 14px; font-size: 18px; letter-spacing: 6px; text-align: center; outline: none; margin-bottom: 12px; }
    #auth-input:focus { border-color: #007aff; }
    #auth-confirm { width: 100%; background: #007aff; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
    #auth-err { font-size: 13px; color: #ff3b30; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>

<!-- Edit modal -->
<div id="edit-overlay" class="modal-overlay">
  <div class="modal-box">
    <h3 id="edit-title">기록 수정</h3>
    <div id="edit-fields"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- Manage modal (약 / 할일 항목 관리) -->
<div id="manage-overlay" class="modal-overlay">
  <div class="modal-box">
    <h3 id="manage-title">항목 수정</h3>
    <div id="manage-list"></div>
    <div class="manage-add-row">
      <input id="manage-input" placeholder="새 항목 입력" onkeydown="if(event.key==='Enter')manageAdd()">
      <button class="manage-add-submit" onclick="manageAdd()">추가</button>
    </div>
    <button class="btn-close" onclick="closeManageModal()">닫기</button>
  </div>
</div>

<!-- Todo completion time modal -->
<div id="todo-time-overlay" class="modal-overlay">
  <div class="modal-box">
    <h3 id="todo-time-title">완료 시각</h3>
    <p style="font-size:13px; color:#8e8e93; margin-bottom:14px;" id="todo-time-label"></p>
    <div class="edit-field">
      <label>완료 시각</label>
      <div class="edit-field-row">
        <input type="date" id="tt-date">
        <input type="time" id="tt-time" step="300">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeTodoTimeModal()">취소</button>
      <button class="btn-primary" onclick="confirmTodoCheck()">완료</button>
    </div>
  </div>
</div>

<div id="auth-overlay">
  <div id="auth-box">
    <h2>라이프 로그</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="auth-input" maxlength="20" onkeydown="if(event.key==='Enter')checkAuth()">
    <button id="auth-confirm" onclick="checkAuth()">확인</button>
    <div id="auth-err"></div>
  </div>
</div>

<header>
  <a href="index.html">← 홈</a>
  <h1>라이프 로그</h1>
</header>

<div class="container">

  <div class="card">
    <div class="card-header">
      <div class="card-title">오늘</div>
      <div class="today-datetime" id="today-datetime"></div>
    </div>
    <div class="status-row">
      <div class="status-cell"><div class="lbl">취침</div><div class="val" id="s-start">—</div></div>
      <div class="status-cell"><div class="lbl">기상</div><div class="val" id="s-end">—</div></div>
      <div class="status-cell"><div class="lbl">수면</div><div class="val" id="s-dur">—</div></div>
      <div class="status-cell"><div class="lbl">복약</div><div class="val" id="s-med">0</div></div>
      <div class="status-cell"><div class="lbl">할일</div><div class="val" id="s-todo">0</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">기분</div>
    </div>
    <div class="mood-emoji-row">
      <button class="mood-emoji-btn" data-score="1" onclick="selectMoodScore(1)">😢</button>
      <button class="mood-emoji-btn" data-score="2" onclick="selectMoodScore(2)">😔</button>
      <button class="mood-emoji-btn" data-score="3" onclick="selectMoodScore(3)">😐</button>
      <button class="mood-emoji-btn" data-score="4" onclick="selectMoodScore(4)">🙂</button>
      <button class="mood-emoji-btn" data-score="5" onclick="selectMoodScore(5)">😊</button>
    </div>
    <textarea class="mood-memo" id="mood-memo" placeholder="오늘 한마디 (선택)" rows="2"></textarea>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
      <div style="font-size:13px; color:#8e8e93;" id="mood-today"></div>
      <button class="mood-save-btn" onclick="saveMood()">저장</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">약</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="now-btn" onclick="openManageModal('med')">항목 수정</button>
        <button class="now-btn" onclick="setNow()">지금으로</button>
      </div>
    </div>
    <div class="dt-row" style="margin-bottom:12px;">
      <input type="date" id="log-date">
      <input type="time" id="log-time" step="300">
    </div>
    <div class="med-row" id="med-row"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">할일</div>
      <button class="now-btn" onclick="openManageModal('todo')">항목 수정</button>
    </div>
    <div class="todo-add-row">
      <input type="text" id="todo-input" placeholder="할일 빠른 추가" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="todo-add-submit" onclick="addTodo()">추가</button>
    </div>
    <div id="todo-list"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">시간 기록</div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="now-btn" onclick="openManageModal('activity')">항목 수정</button>
        <button class="now-btn" onclick="setActNow()">지금으로</button>
      </div>
    </div>
    <div class="act-inputs">
      <div class="act-input-row">
        <span class="act-lbl">시작</span>
        <input type="date" id="act-start-date">
        <input type="time" id="act-start-time" step="300">
      </div>
      <div class="act-input-row">
        <span class="act-lbl">종료</span>
        <input type="date" id="act-end-date">
        <input type="time" id="act-end-time" step="300">
      </div>
      <div class="act-input-row">
        <span class="act-lbl">내용</span>
        <input type="text" id="act-content" placeholder="메모 (선택)" style="border-radius:8px;">
      </div>
    </div>
    <div class="act-btns" id="act-btns"></div>
  </div>

  <div class="card">
    <div class="card-title">그래프</div>
    <div class="chart-tab-row">
      <button class="tab active" data-chart="duration" onclick="switchChart('duration')">수면 시간</button>
      <button class="tab" data-chart="timing" onclick="switchChart('timing')">수면 타이밍</button>
      <button class="tab" data-chart="med" onclick="switchChart('med')">복약 타이밍</button>
      <button class="tab" data-chart="activity" onclick="switchChart('activity')">시간 분석</button>
      <button class="tab" data-chart="report" onclick="switchChart('report')">종합 리포트</button>
    </div>
    <div class="period-row" style="align-items:center;">
      <button class="period-btn active" data-period="week" onclick="switchPeriod('week')">주간</button>
      <button class="period-btn" data-period="month" onclick="switchPeriod('month')">월간</button>
      <button class="period-btn" data-period="year" onclick="switchPeriod('year')">년간</button>
      <div class="year-nav" id="year-nav">
        <button onclick="changeYear(-1)">◀</button>
        <span id="year-label">2026년</span>
        <button onclick="changeYear(1)">▶</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div id="report-wrap" style="display:none;"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title" style="cursor:pointer;" onclick="toggleLogCollapse()">최근 기록 <span id="log-toggle-icon">▾</span></div>
      <button class="now-btn" style="color:#ff3b30;" onclick="clearAllLogs()">전체 삭제</button>
    </div>
    <div id="log-filter-wrap">
      <div class="log-filter-row" id="log-filter-row"></div>
    </div>
    <div id="log-items"></div>
  </div>

  <div class="card">
    <div class="card-title">데이터</div>
    <div style="display:flex; gap:8px;">
      <button class="add-med-btn" style="flex:1; border-radius:8px; padding:10px;" onclick="exportData()">⬇ 내보내기</button>
      <label class="add-med-btn" style="flex:1; border-radius:8px; padding:10px; text-align:center; cursor:pointer;">
        ⬆ 불러오기
        <input type="file" accept=".json" style="display:none;" onchange="importData(event)">
      </label>
    </div>
  </div>

</div>

<script>
(function () {
  if (sessionStorage.getItem('lifeLogAuth') === '1') {
    document.getElementById('auth-overlay').style.display = 'none';
  } else {
    document.getElementById('auth-input').focus();
  }
})();

function checkAuth() {
  if (document.getElementById('auth-input').value === '1029') {
    sessionStorage.setItem('lifeLogAuth', '1');
    document.getElementById('auth-overlay').style.display = 'none';
  } else {
    document.getElementById('auth-err').textContent = '비밀번호가 틀렸습니다';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
}

const KEY = 'lifeLog_v1';
let chartInst = null;
let activeChart = 'duration';
let chartPeriod = 'week';
let chartYear = new Date().getFullYear();
let logCollapsed = false;
let activeLogFilter = 'all';
let selectedMoodScore = 0;
const MOOD_EMOJIS = ['', '😢', '😔', '😐', '🙂', '😊'];

// ── Data ──────────────────────────────────────────────────────────

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    const d = raw ? JSON.parse(raw) : {};
    if (!d.medNames)       d.medNames       = [];
    if (!d.medColors)      d.medColors      = {};
    if (!d.logs)           d.logs           = [];
    if (!d.todos)          d.todos          = [];
    if (!d.moodLogs)       d.moodLogs       = [];
    if (!d.actCategories || !d.actCategories.length)
      d.actCategories = DEFAULT_ACT_CATEGORIES.map(c => ({...c}));
    return d;
  } catch { return { medNames: [], medColors: {}, logs: [], todos: [], moodLogs: [] }; }
}

function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

// ── Helpers ───────────────────────────────────────────────────────

function fmtTime(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function fmtMonth(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}월`;
}
function toHour(iso) {
  const d = new Date(iso);
  return d.getHours() + d.getMinutes() / 60;
}
function isToday(iso) {
  const d = new Date(iso), t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}


function getWeekMonday(date) {
  const d = new Date(date || new Date());
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d;
}

function getMonthWeeks(y, m) {
  const weeks = [];
  const first = new Date(y, m, 1);
  const last  = new Date(y, m + 1, 0);
  let cur = new Date(first);
  let num = 1;
  while (cur <= last) {
    const end = new Date(cur);
    end.setDate(cur.getDate() + 6);
    if (end > last) end.setTime(last.getTime());
    end.setHours(23, 59, 59, 999);
    weeks.push({ label: `${num}주`, start: new Date(cur), end: new Date(end) });
    cur.setDate(cur.getDate() + 7);
    num++;
  }
  return weeks;
}

function avgTimeOfDay(isoArr) {
  if (!isoArr || !isoArr.length) return '—';
  let total = 0;
  isoArr.forEach(iso => { const d = new Date(iso); total += d.getHours() + d.getMinutes() / 60; });
  const avg = total / isoArr.length;
  const h = Math.floor(avg) % 24;
  const min = Math.round((avg % 1) * 60) % 60;
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}

function getChartSetup() {
  const now = new Date();
  if (chartPeriod === 'week') {
    const mon = getWeekMonday();
    const dates = Array.from({length: 7}, (_, i) => {
      const d = new Date(mon);
      d.setDate(mon.getDate() + i);
      d.setHours(0, 0, 0, 0);
      return d;
    });
    const labels = dates.map(d => `${d.getMonth()+1}/${d.getDate()}`);
    const strs   = dates.map(d => d.toDateString());
    return {
      labels, dates, isWeek: true,
      getBucket: (iso) => {
        const d = new Date(iso); d.setHours(0, 0, 0, 0);
        const i = strs.indexOf(d.toDateString());
        return i >= 0 ? labels[i] : null;
      },
    };
  } else if (chartPeriod === 'month') {
    const weeks = getMonthWeeks(now.getFullYear(), now.getMonth());
    const labels = weeks.map(w => w.label);
    return {
      labels, weeks, isMonth: true,
      getBucket: (iso) => {
        const d = new Date(iso);
        const w = weeks.find(w => d >= w.start && d <= w.end);
        return w ? w.label : null;
      },
    };
  } else {
    const y = chartYear;
    const labels = Array.from({length: 12}, (_, i) => `${i+1}월`);
    return {
      labels, isYear: true, year: y,
      getBucket: (iso) => {
        const d = new Date(iso);
        if (d.getFullYear() !== y) return null;
        return `${d.getMonth()+1}월`;
      },
    };
  }
}

function getSessions(logs) {
  const sessions = [];
  let pending = null;
  for (const l of logs) {
    if (l.type === 'sleep_start') {
      pending = l;
    } else if (l.type === 'sleep_end' && pending) {
      sessions.push({ startId: pending.id, endId: l.id, start: pending.ts, end: l.ts });
      pending = null;
    }
  }
  if (pending) sessions.push({ startId: pending.id, endId: null, start: pending.ts, end: null });
  return sessions;
}

function makeEmojiImg(emoji, size) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.font = `${size - 2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, size / 2, size / 2);
  const img = new Image();
  img.src = c.toDataURL();
  return img;
}

function updateClock() {

function saveEdit() {
  if (!editingId) return;
  const data = load();
  const getVal = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  const buildTs = (dateId, timeId, fallback) => {
    const d = getVal(dateId), t = getVal(timeId);
    return d && t ? new Date(`${d}T${t}`).toISOString() : fallback;
  };

  if (editingId2 !== null && editingId2 !== undefined) {
    const newSleep = buildTs('ef-date',  'ef-time',  data.logs.find(l => l.id === editingId)?.ts);
    const newWake  = editingId2 ? buildTs('ef-edate', 'ef-etime', data.logs.find(l => l.id === editingId2)?.ts) : null;
    if (newWake && new Date(newWake) < new Date(newSleep)) { alert('기상 시각이 취침 시각보다 같거나 늦어야 합니다'); return; }
    const s = data.logs.find(l => l.id === editingId);
    if (s) s.ts = newSleep;
    if (editingId2 && newWake) {
      const e = data.logs.find(l => l.id === editingId2);
      if (e) e.ts = newWake;
    }
  } else {
    const l = data.logs.find(l => l.id === editingId);
    if (!l) return;
    if (l.type === 'med') {
      l.name = getVal('ef-name') || l.name;
      l.ts = buildTs('ef-date', 'ef-time', l.ts);
    } else if (l.type === 'activity') {
      const newStart = buildTs('ef-date',  'ef-time',  l.ts);
      const newEnd   = buildTs('ef-edate', 'ef-etime', l.endTs);
      if (new Date(newEnd) < new Date(newStart)) { alert('종료 시각이 시작 시각보다 같거나 늦어야 합니다'); return; }
      l.category = getVal('ef-cat') || l.category;
      l.ts    = newStart;
      l.endTs = newEnd;
      l.content = getVal('ef-content');
    } else if (l.type === 'todo') {
      l.text = getVal('ef-text') || l.text;
      l.ts = buildTs('ef-date', 'ef-time', l.ts);
    }
  }

  data.logs.sort((a, b) => new Date(a.ts) - new Date(b.ts));
  save(data);
  closeEditModal();
  render();
}

function deleteLog(id) {
  const data = load();
  data.logs = data.logs.filter(l => l.id !== id);
  save(data);
  render();
}

function deleteSleepSession(startId, endId) {
  if (!confirm('취침 기록을 삭제할까요?')) return;
  const data = load();
  data.logs = data.logs.filter(l => l.id !== startId && l.id !== endId);
  save(data);
  render();
}

function switchChart(type) {
  activeChart = type;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.chart === type));
  renderChart(load());
}

function switchPeriod(p) {
  chartPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period === p));
  const yn = document.getElementById('year-nav');
  if (yn) yn.classList.toggle('show', p === 'year');
  renderChart(load());
}

function changeYear(delta) {
  chartYear += delta;
  const el = document.getElementById('year-label');
  if (el) el.textContent = `${chartYear}년`;
  renderChart(load());
}

function switchLogFilter(f) {
  activeLogFilter = f;
  document.querySelectorAll('.log-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderLogs(load());
}

// ── Collapse ──────────────────────────────────────────────────────

function toggleLogCollapse() {
  logCollapsed = !logCollapsed;
  document.getElementById('log-items').style.display = logCollapsed ? 'none' : '';
  document.getElementById('log-filter-wrap').style.display = logCollapsed ? 'none' : '';
  document.getElementById('log-toggle-icon').textContent = logCollapsed ? '▸' : '▾';
}

function clearAllLogs() {
  if (!confirm('모든 기록을 삭제할까요?')) return;
  const data = load();
  data.logs = [];
  save(data);
  render();
}

// ── Render ────────────────────────────────────────────────────────

function render() {
  const data = load();
  syncActCategories(data);
  renderSummary(data);
  renderMoodCard(data);
  renderMedRow(data);
  renderTodos(data);
  renderActButtons(data);
  renderChart(data);
  renderLogFilter();
  renderLogs(data);
}

function renderSummary(data) {
  const sessions = getSessions(data.logs);
  const today = new Date();
  let todaySess = null;
  for (let i = sessions.length - 1; i >= 0; i--) {
    const s = sessions[i];
    const endD = s.end ? new Date(s.end) : today;
    const startD = new Date(s.start);
    if (endD.toDateString() === today.toDateString() || startD.toDateString() === today.toDateString()) {
      todaySess = s; break;
    }
  }
  if (todaySess) {
    document.getElementById('s-start').textContent = fmtTime(todaySess.start);
    if (todaySess.end) {
      document.getElementById('s-end').textContent = fmtTime(todaySess.end);
      const h = (new Date(todaySess.end) - new Date(todaySess.start)) / 3600000;
      document.getElementById('s-dur').textContent = h.toFixed(1) + 'h';
    } else {
      document.getElementById('s-end').textContent = '취침중';
      document.getElementById('s-dur').textContent = '—';
    }
  } else {
    ['s-start','s-end','s-dur'].forEach(id => document.getElementById(id).textContent = '—');
  }
  document.getElementById('s-med').textContent = String(data.logs.filter(l => l.type === 'med' && isToday(l.ts)).length);
  document.getElementById('s-todo').textContent = String(data.logs.filter(l => l.type === 'todo' && isToday(l.ts)).length);
}

function renderTodos(data) {
  const el = document.getElementById('todo-list');
  if (!data.todos.length) {
    el.innerHTML = '<div class="empty-msg">할일이 없습니다</div>';
    return;
  }
  el.innerHTML = data.todos.map(t => `
    <div class="todo-item">
      <button class="todo-check" onclick="${t.done ? `uncheckTodo('${t.id}')` : `openTodoTimeModal('${t.id}')`}">${t.done ? '✅' : '⬜'}</button>
      <span class="todo-text${t.done ? ' done' : ''}">${t.text}</span>
    </div>`).join('');
}

function renderMedRow(data) {
  const row = document.getElementById('med-row');
  row.innerHTML = '';
  data.medNames.forEach((name, i) => {
    const color = data.medColors[name] || MED_DEFAULT_COLORS[i % MED_DEFAULT_COLORS.length];
    const chip = document.createElement('div');
    chip.className = 'med-chip';
    const btn = document.createElement('button');
    btn.className = 'med-btn';
    btn.textContent = `💊 ${name}`;
    btn.style.background = color + '33';
    btn.style.color = color;
    btn.onclick = () => logMed(name);
    chip.appendChild(btn);
    row.appendChild(chip);
  });
}

function renderActButtons(data) {
  const wrap = document.getElementById('act-btns');
  if (!wrap) return;
  wrap.innerHTML = '';
  (data.actCategories || DEFAULT_ACT_CATEGORIES).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'act-btn';
    btn.style.borderLeft = `3px solid ${cat.color}`;
    btn.textContent = `${cat.emoji || ''} ${cat.name}`.trim();
    btn.onclick = () => logActivity(cat.name);
    wrap.appendChild(btn);
  });
  const sleepBtn = document.createElement('button');
  sleepBtn.className = 'act-btn';
  sleepBtn.style.cssText = 'background:#e8edf2; color:#4e6880; font-weight:600;';
  sleepBtn.textContent = '😴 취침';
  sleepBtn.onclick = logSleepBlock;
  wrap.appendChild(sleepBtn);
}

function renderLogFilter() {
  const filters = [
    { key: 'all', label: '전체' },
    { key: 'sleep', label: '😴 취침' },
    { key: 'med', label: '💊 복약' },
    ...ACT_CATEGORIES.map(c => ({ key: c, label: `${ACT_EMOJI[c]} ${c}` })),
    { key: 'todo', label: '✅ 할일' },
  ];
  document.getElementById('log-filter-row').innerHTML = filters.map(f =>
    `<button class="log-filter-btn${activeLogFilter === f.key ? ' active' : ''}" data-filter="${f.key}" onclick="switchLogFilter('${f.key}')">${f.label}</button>`
  ).join('');
}

function renderLogs(data) {
  const el = document.getElementById('log-items');
  el.style.display = logCollapsed ? 'none' : '';

  const sessions = getSessions(data.logs);
  const sessionStartIds = new Set(sessions.map(s => s.startId));
  const sessionEndIds   = new Set(sessions.filter(s => s.endId).map(s => s.endId));
  const sessionByStartId = Object.fromEntries(sessions.map(s => [s.startId, s]));

  // Build display items: merge sleep pairs, filter orphan sleep_end
  const displayItems = [];
  for (const l of [...data.logs].reverse()) {
    if (l.type === 'sleep_end') continue; // handled via sleep_start pairing
    if (l.type === 'sleep_start') {
      const sess = sessionByStartId[l.id];
      if (sess) displayItems.push({ kind: 'sleep', sess, l });
    } else {
      displayItems.push({ kind: 'log', l });
    }
  }

  // Apply filter
  const filtered = displayItems.filter(item => {
    if (activeLogFilter === 'all') return true;
    if (activeLogFilter === 'sleep') return item.kind === 'sleep';
    if (activeLogFilter === 'med') return item.kind === 'log' && item.l.type === 'med';
    if (activeLogFilter === 'todo') return item.kind === 'log' && item.l.type === 'todo';
    // activity category
    return item.kind === 'log' && item.l.type === 'activity' && item.l.category === activeLogFilter;
  }).slice(0, 30);

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-msg">기록이 없습니다</div>';
    return;
  }

  el.innerHTML = filtered.map(item => {
    let label, timeStr, editBtn, delBtn;
    if (item.kind === 'sleep') {
      const sess = item.sess;
      if (sess.end) {
        const h = ((new Date(sess.end) - new Date(sess.start)) / 3600000).toFixed(1);
        label = `😴 취침 ${fmtTime(sess.start)} → ☀️ 기상 ${fmtTime(sess.end)} (${h}h)`;
        timeStr = `${fmtDate(sess.start)}`;
        editBtn = `<button class="edit-log-btn" onclick="openEditSleepModal('${sess.startId}','${sess.endId}')">수정</button>`;
        delBtn  = `<button class="del-btn" onclick="deleteSleepSession('${sess.startId}','${sess.endId}')">삭제</button>`;
      } else {
        label = `😴 취침중 (${fmtTime(sess.start)}~)`;
        timeStr = fmtDate(sess.start);
        editBtn = `<button class="edit-log-btn" onclick="openEditSleepModal('${sess.startId}',null)">수정</button>`;
        delBtn  = `<button class="del-btn" onclick="deleteLog('${sess.startId}')">삭제</button>`;
      }
    } else {
      const l = item.l;
      if (l.type === 'med') {
        label = `💊 ${l.name}`;
        timeStr = `${fmtDate(l.ts)} ${fmtTime(l.ts)}`;
      } else if (l.type === 'activity') {
        const dur = ((new Date(l.endTs) - new Date(l.ts)) / 3600000).toFixed(1);
        label = `${ACT_EMOJI[l.category] || '⏱'} ${l.category}${l.content ? ' · ' + l.content : ''} (${dur}h)`;
        timeStr = `${fmtDate(l.ts)} ${fmtTime(l.ts)}–${fmtTime(l.endTs)}`;
      } else if (l.type === 'todo') {
        label = `✅ ${l.text}`;
        timeStr = `${fmtDate(l.ts)} ${fmtTime(l.ts)}`;
      }
      editBtn = `<button class="edit-log-btn" onclick="openEditModal('${l.id}')">수정</button>`;
      delBtn  = `<button class="del-btn" onclick="deleteLog('${l.id}')">삭제</button>`;
    }
    return `<div class="log-row">
      <span style="flex:1; margin-right:8px; font-size:13px;">${label}</span>
      <span class="log-meta">
        <span class="log-time-str">${timeStr}</span>
        ${editBtn}${delBtn}
      </span>
    </div>`;
  }).join('');
}

// ── Charts ────────────────────────────────────────────────────────

function renderChart(data) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const isReport = activeChart === 'report';
  document.getElementById('chart').style.display = isReport ? 'none' : 'block';
  document.getElementById('report-wrap').style.display = isReport ? 'block' : 'none';
  if (isReport) { renderReport(data); return; }

  const ctx = document.getElementById('chart').getContext('2d');
  const setup = getChartSetup();
  const {labels, getBucket} = setup;

  if (activeChart === 'duration') {
    const sessions = getSessions(data.logs);
    const durByLabel = {}, cntByLabel = {};
    sessions.forEach(s => {
      if (!s.end) return;
      const b = getBucket(s.end);
      if (!b) return;
      durByLabel[b] = (durByLabel[b] || 0) + (new Date(s.end) - new Date(s.start)) / 3600000;
      cntByLabel[b] = (cntByLabel[b] || 0) + 1;
    });
    const vals = labels.map(l => {
      if (durByLabel[l] == null) return null;
      return setup.isWeek ? +durByLabel[l].toFixed(2) : +(durByLabel[l] / cntByLabel[l]).toFixed(2);
    });
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ label: setup.isWeek ? '수면 시간 (h)' : '평균 수면 (h)', data: vals, backgroundColor: '#4e6880', borderRadius: 5 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, max: 14, ticks: { callback: v => v + 'h' } } }
      }
    });

  } else if (activeChart === 'timing') {
    const sessions = getSessions(data.logs);
    const labelIdx = Object.fromEntries(labels.map((l, i) => [l, i]));
    const sleepPts = [], wakePts = [], linePairs = [];
    sessions.forEach(s => {
      const sb = getBucket(s.start);
      const si = sb != null ? labelIdx[sb] : null;
      if (si != null) {
        sleepPts.push({ x: si, y: toHour(s.start) });
        if (s.end) {
          const eb = getBucket(s.end);
          const ei = eb != null ? labelIdx[eb] : null;
          if (ei != null) {
            wakePts.push({ x: ei, y: toHour(s.end) });
            linePairs.push([{ x: si, y: toHour(s.start) }, { x: ei, y: toHour(s.end) }]);
          }
        }
      }
    });
    const moonImg = makeEmojiImg('🌙', 22);
    const sunImg  = makeEmojiImg('☀️', 22);
    const lineDatasets = linePairs.map(pair => ({
      type: 'line', data: pair, borderColor: 'rgba(78,104,128,0.35)', borderWidth: 1.5,
      borderDash: [4, 3], pointRadius: 0, showLine: true, tension: 0, label: '',
    }));
    chartInst = new Chart(ctx, {
      type: 'scatter',
      data: { datasets: [...lineDatasets,
        { label: '취침 🌙', data: sleepPts, pointStyle: moonImg, pointRadius: 11, backgroundColor: 'transparent' },
        { label: '기상 ☀️', data: wakePts,  pointStyle: sunImg,  pointRadius: 11, backgroundColor: 'transparent' },
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { filter: item => item.text !== '' } } },
        scales: {
          x: { type: 'linear', min: -0.5, max: labels.length - 0.5, ticks: { stepSize: 1, callback: v => labels[Math.round(v)] || '' } },
          y: { min: 0, max: 24, ticks: { stepSize: 3, callback: v => `${String(v).padStart(2,'0')}:00` } }
        }
      }
    });

  } else if (activeChart === 'activity') {
    const acts = data.logs.filter(l => l.type === 'activity');
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: ACT_CATEGORIES.map((cat, ci) => ({
          label: cat,
          data: labels.map(lb => {
            const total = acts.filter(l => l.category === cat && getBucket(l.ts) === lb)
              .reduce((s, l) => s + (new Date(l.endTs) - new Date(l.ts)) / 3600000, 0);
            return total > 0 ? +total.toFixed(2) : null;
          }),
          backgroundColor: ACT_COLORS[ci], borderRadius: 3, stack: 'act',
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { callback: v => v + 'h' } } }
      }
    });

  } else {
    // med timing
    const labelIdx = Object.fromEntries(labels.map((l, i) => [l, i]));
    const allNames = [...new Set(data.logs.filter(l => l.type === 'med').map(l => l.name))];
    const datasets = allNames.map((name, ci) => {
      const color = data.medColors[name] || MED_DEFAULT_COLORS[ci % MED_DEFAULT_COLORS.length];
      return {
        label: name,
        data: data.logs.filter(l => l.type === 'med' && l.name === name)
          .map(l => { const b = getBucket(l.ts); const xi = b != null ? labelIdx[b] : null; return xi != null ? { x: xi, y: toHour(l.ts) } : null; })
          .filter(Boolean),
        backgroundColor: color, pointRadius: 8,
      };
    });
    chartInst = new Chart(ctx, {
      type: 'scatter', data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { type: 'linear', min: -0.5, max: labels.length - 0.5, ticks: { stepSize: 1, callback: v => labels[Math.round(v)] || '' } },
          y: { min: 0, max: 24, ticks: { stepSize: 3, callback: v => `${String(v).padStart(2,'0')}:00` } }
        }
      }
    });
  }
}

function reportSleepStats(sessions, start, end) {
  const inRange = sessions.filter(s => s.end && new Date(s.end) >= start && new Date(s.end) <= end);
  const durs = inRange.map(s => (new Date(s.end) - new Date(s.start)) / 3600000);
  return {
    count: durs.length,
    avgDur: durs.length ? (durs.reduce((a,b)=>a+b,0)/durs.length).toFixed(1) : '—',
    avgBed: avgTimeOfDay(inRange.map(s => s.start)),
    avgWake: avgTimeOfDay(inRange.map(s => s.end)),
  };
}

function reportActStats(acts, start, end, catList, colList) {
  const inRange = acts.filter(l => new Date(l.ts) >= start && new Date(l.ts) <= end);
  return catList.map((cat, i) => {
    const total = inRange.filter(l => l.category === cat)
      .reduce((s, l) => s + (new Date(l.endTs) - new Date(l.ts)) / 3600000, 0);
    return { cat, total: +total.toFixed(2), color: colList[i] };
  });
}

function reportMoodStats(moodLogs, start, end) {
  const inRange = (moodLogs || []).filter(m => { const d = new Date(m.date); return d >= start && d <= end; });
  const avg = inRange.length ? (inRange.reduce((s,m)=>s+m.score,0)/inRange.length).toFixed(1) : '—';
  return { entries: inRange, avg };
}

function reportTodosInRange(todoLogs, start, end) {
  return todoLogs.filter(l => new Date(l.ts) >= start && new Date(l.ts) <= end);
}

function reportMedStats(medLogs, start, end, allNames) {
  const inRange = medLogs.filter(l => new Date(l.ts) >= start && new Date(l.ts) <= end);
  return allNames.map(name => ({
    name, avgTime: avgTimeOfDay(inRange.filter(l => l.name === name).map(l => l.ts))
  }));
}

function rSec(title) {
  return `<div style="font-size:12px; color:#8e8e93; font-weight:600; letter-spacing:0.5px; margin:14px 0 6px;">${title}</div>`;
}
function rStatGrid(items) {
  return `<div style="display:grid; grid-template-columns:repeat(${Math.min(items.length,3)}, 1fr); gap:6px; margin-bottom:8px;">
    ${items.map(it => `<div style="background:#f2f2f7; border-radius:8px; padding:10px 8px; text-align:center;">
      <div style="font-size:11px; color:#8e8e93; margin-bottom:3px;">${it.lbl}</div>
      <div style="font-size:16px; font-weight:700;">${it.val}</div>
    </div>`).join('')}
  </div>`;
}
function rActBars(catStats) {
  const grand = catStats.reduce((s,c)=>s+c.total,0);
  if (!grand) return '<div style="font-size:13px; color:#8e8e93;">기록 없음</div>';
  return catStats.map(c => `
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
      <span style="width:68px; font-size:12px;">${ACT_EMOJI[c.cat]||''} ${c.cat}</span>
      <div style="flex:1; background:#f2f2f7; border-radius:4px; height:8px; overflow:hidden;">
        <div style="height:100%; width:${grand>0?(c.total/grand*100).toFixed(1):0}%; background:${c.color}; border-radius:4px;"></div>
      </div>
      <span style="font-size:12px; font-weight:600; width:34px; text-align:right;">${c.total.toFixed(1)}h</span>
    </div>`).join('');
}

function renderReport(data) {
  const wrap = document.getElementById('report-wrap');
  const setup = getChartSetup();
  const sessions = getSessions(data.logs);
  const acts = data.logs.filter(l => l.type === 'activity');
  const meds = data.logs.filter(l => l.type === 'med');
  const todoLogs = data.logs.filter(l => l.type === 'todo');
  const allMedNames = [...new Set(meds.map(l => l.name))];

  let html = '';

  if (setup.isWeek) {
    const {dates, labels} = setup;
    const mon = dates[0], sun = new Date(dates[6]); sun.setHours(23,59,59,999);
    const monStr = `${mon.getMonth()+1}/${mon.getDate()}`;
    const sunStr = `${sun.getMonth()+1}/${sun.getDate()}`;
    const DAY_KO = ['월','화','수','목','금','토','일'];

    const sleep = reportSleepStats(sessions, mon, sun);
    const catStats = reportActStats(acts, mon, sun, ACT_CATEGORIES, ACT_COLORS);
    const mood = reportMoodStats(data.moodLogs, mon, sun);
    const medStats = reportMedStats(meds, mon, sun, allMedNames);
    const weekTodos = reportTodosInRange(todoLogs, mon, sun);

    html += `<div style="font-size:13px; font-weight:600; margin-bottom:12px; color:#4e6880;">📅 ${monStr} (월) ~ ${sunStr} (일)</div>`;

    html += rSec('💤 수면');
    html += rStatGrid([
      {lbl:'평균 수면', val: sleep.avgDur + (sleep.avgDur!=='—'?'h':'')},
      {lbl:'평균 취침', val: sleep.avgBed},
      {lbl:'평균 기상', val: sleep.avgWake},
    ]);

    if (allMedNames.length) {
      html += rSec('💊 복약 (평균 시각)');
      html += rStatGrid(medStats.map(m => ({lbl: m.name, val: m.avgTime})));
    }

    html += rSec('⏱ 활동');
    html += rActBars(catStats);

    html += rSec('✅ 할일 (일별)');
    const dayNames = ['월','화','수','목','금','토','일'];
    const todoByDay = dates.map(d => {
      const ds = d.toISOString().slice(0,10);
      return todoLogs.filter(l => l.ts.slice(0,10) === ds);
    });
    const hasTodo = todoByDay.some(arr => arr.length > 0);
    if (!hasTodo) {
      html += '<div style="font-size:13px; color:#8e8e93; margin-bottom:6px;">완료 기록 없음</div>';
    } else {
      html += '<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:8px;">';
      dayNames.forEach((dn, i) => {
        html += `<div style="text-align:center; font-size:11px; color:#8e8e93; padding:4px 0;">${dn}</div>`;
      });
      todoByDay.forEach(arr => {
        html += `<div style="text-align:center; font-size:13px; font-weight:600; padding:4px 0;">${arr.length > 0 ? arr.length + '건' : '—'}</div>`;
      });
      html += '</div>';
      weekTodos.forEach(l => {
        const d = new Date(l.ts);
        html += `<div style="font-size:12px; color:#3a3a3c; margin-bottom:3px;">✅ ${l.text} <span style="color:#8e8e93;">(${DAY_KO[(d.getDay()+6)%7]} ${fmtTime(l.ts)})</span></div>`;
      });
    }

    html += rSec('😊 기분');
    html += `<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:6px;">`;
    dayNames.forEach(dn => { html += `<div style="text-align:center; font-size:11px; color:#8e8e93;">${dn}</div>`; });
    dates.forEach(d => {
      const ds = d.toISOString().slice(0,10);
      const m = (data.moodLogs||[]).find(m => m.date === ds);
      html += `<div style="text-align:center; font-size:18px;">${m ? MOOD_EMOJIS[m.score] : '—'}</div>`;
    });
    html += `</div><div style="font-size:13px; color:#8e8e93;">평균: ${mood.avg}${mood.avg!=='—'?'/5':''}</div>`;

  } else if (setup.isMonth) {
    const {weeks} = setup;
    const now = new Date();
    html += `<div style="font-size:13px; font-weight:600; margin-bottom:12px; color:#4e6880;">📅 ${now.getFullYear()}년 ${now.getMonth()+1}월</div>`;

    // Per-week breakdown
    weeks.forEach(w => {
      const sleep = reportSleepStats(sessions, w.start, w.end);
      const catStats = reportActStats(acts, w.start, w.end, ACT_CATEGORIES, ACT_COLORS);
      const mood = reportMoodStats(data.moodLogs, w.start, w.end);
      const medStats = reportMedStats(meds, w.start, w.end, allMedNames);
      const weekTodos = reportTodosInRange(todoLogs, w.start, w.end);
      const ws = `${w.start.getMonth()+1}/${w.start.getDate()}`;
      const we = `${w.end.getMonth()+1}/${w.end.getDate() > new Date(now.getFullYear(), now.getMonth()+1,0).getDate() ? new Date(now.getFullYear(), now.getMonth()+1,0).getDate() : w.end.getDate()}`;

      html += `<div style="background:#f8f8fa; border-radius:8px; padding:12px; margin-bottom:10px;">`;
      html += `<div style="font-size:12px; font-weight:700; color:#4e6880; margin-bottom:8px;">${w.label} (${ws}~${w.end.getMonth()+1}/${w.end.getDate()})</div>`;
      html += rStatGrid([
        {lbl:'평균 수면', val: sleep.avgDur+(sleep.avgDur!=='—'?'h':'')},
        {lbl:'취침', val: sleep.avgBed},
        {lbl:'기상', val: sleep.avgWake},
      ]);
      const actGrand = catStats.reduce((s,c)=>s+c.total,0);
      if (actGrand > 0) {
        html += `<div style="font-size:11px; color:#8e8e93; margin-bottom:4px;">활동</div>`;
        html += rActBars(catStats);
      }
      if (weekTodos.length) {
        html += `<div style="font-size:11px; color:#8e8e93; margin-top:4px; margin-bottom:3px;">할일 ${weekTodos.length}건</div>`;
        weekTodos.slice(0,5).forEach(l => { html += `<div style="font-size:12px; color:#3a3a3c;">✅ ${l.text}</div>`; });
        if (weekTodos.length > 5) html += `<div style="font-size:12px; color:#8e8e93;">외 ${weekTodos.length-5}건</div>`;
      }
      if (mood.entries.length) {
        html += `<div style="font-size:11px; color:#8e8e93; margin-top:4px;">기분 평균 ${mood.avg}/5 · `;
        html += mood.entries.map(m => MOOD_EMOJIS[m.score]).join('') + '</div>';
      }
      html += '</div>';
    });

    // Monthly totals
    const mStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const mEnd   = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59,999);
    const mSleep = reportSleepStats(sessions, mStart, mEnd);
    const mCat   = reportActStats(acts, mStart, mEnd, ACT_CATEGORIES, ACT_COLORS);
    const mMood  = reportMoodStats(data.moodLogs, mStart, mEnd);
    const mTodos = reportTodosInRange(todoLogs, mStart, mEnd);
    html += rSec('📊 월간 합계');
    html += rStatGrid([
      {lbl:'평균 수면', val: mSleep.avgDur+(mSleep.avgDur!=='—'?'h':'')},
      {lbl:'취침', val: mSleep.avgBed},
      {lbl:'기상', val: mSleep.avgWake},
    ]);
    html += rActBars(mCat);
    html += `<div style="font-size:13px; color:#8e8e93; margin-top:6px;">할일 완료 ${mTodos.length}건 · 기분 평균 ${mMood.avg}${mMood.avg!=='—'?'/5':''}</div>`;

  } else {
    // Year
    const y = setup.year;
    html += `<div style="font-size:13px; font-weight:600; margin-bottom:12px; color:#4e6880;">📅 ${y}년</div>`;

    for (let m = 0; m < 12; m++) {
      const mStart = new Date(y, m, 1);
      const mEnd   = new Date(y, m+1, 0, 23,59,59,999);
      const sleep  = reportSleepStats(sessions, mStart, mEnd);
      const catStats = reportActStats(acts, mStart, mEnd, ACT_CATEGORIES, ACT_COLORS);
      const mood   = reportMoodStats(data.moodLogs, mStart, mEnd);
      const todos  = reportTodosInRange(todoLogs, mStart, mEnd);
      const actGrand = catStats.reduce((s,c)=>s+c.total,0);
      if (sleep.count === 0 && actGrand === 0 && !mood.entries.length && !todos.length) continue;

      html += `<div style="background:#f8f8fa; border-radius:8px; padding:12px; margin-bottom:8px;">`;
      html += `<div style="font-size:12px; font-weight:700; color:#4e6880; margin-bottom:8px;">${m+1}월</div>`;
      html += rStatGrid([
        {lbl:'평균 수면', val: sleep.avgDur+(sleep.avgDur!=='—'?'h':'')},
        {lbl:'취침', val: sleep.avgBed},
        {lbl:'기상', val: sleep.avgWake},
      ]);
      if (actGrand > 0) html += rActBars(catStats);
      const parts = [];
      if (todos.length) parts.push(`할일 ${todos.length}건`);
      if (mood.entries.length) parts.push(`기분 평균 ${mood.avg}/5`);
      if (parts.length) html += `<div style="font-size:12px; color:#8e8e93; margin-top:4px;">${parts.join(' · ')}</div>`;
      html += '</div>';
    }

    // Yearly totals
    const yStart = new Date(y, 0, 1), yEnd = new Date(y, 11, 31, 23,59,59,999);
    const ySleep = reportSleepStats(sessions, yStart, yEnd);
    const yCat   = reportActStats(acts, yStart, yEnd, ACT_CATEGORIES, ACT_COLORS);
    const yMood  = reportMoodStats(data.moodLogs, yStart, yEnd);
    const yTodos = reportTodosInRange(todoLogs, yStart, yEnd);
    html += rSec(`📊 ${y}년 합계`);
    html += rStatGrid([
      {lbl:'평균 수면', val: ySleep.avgDur+(ySleep.avgDur!=='—'?'h':'')},
      {lbl:'취침', val: ySleep.avgBed},
      {lbl:'기상', val: ySleep.avgWake},
    ]);
    html += rActBars(yCat);
    html += `<div style="font-size:13px; color:#8e8e93; margin-top:6px;">할일 완료 ${yTodos.length}건 · 기분 평균 ${yMood.avg}${yMood.avg!=='—'?'/5':''}</div>`;
  }

  wrap.innerHTML = html;
}

function exportData() {
  const data = load();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lifelog-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.logs || !imported.medNames) throw new Error();
      const current = load();
      const existingIds = new Set(current.logs.map(l => l.id));
      const merged = {
        medNames:      [...new Set([...current.medNames, ...(imported.medNames || [])])],
        medColors:     { ...current.medColors, ...(imported.medColors || {}) },
        actCategories: imported.actCategories || current.actCategories,
        todos:         [...(current.todos || []), ...(imported.todos || []).filter(t => !(current.todos||[]).find(x => x.id === t.id))],
        moodLogs:      [...(current.moodLogs || []), ...(imported.moodLogs || []).filter(m => !(current.moodLogs||[]).find(x => x.date === m.date))],
        logs:          [...current.logs, ...imported.logs.filter(l => !existingIds.has(l.id))].sort((a,b) => new Date(a.ts)-new Date(b.ts))
      };
      save(merged);
      render();
      alert(`불러오기 완료: 로그 ${imported.logs.length}개 병합됨`);
    } catch {
      alert('올바른 라이프 로그 파일이 아닙니다');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Modal backdrop close ──────────────────────────────────────────
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('open');
      if (overlay.id === 'edit-overlay') { editingId = null; editingId2 = null; }
      if (overlay.id === 'manage-overlay') { manageType = null; render(); }
      if (overlay.id === 'todo-time-overlay') pendingTodoId = null;
    }
  });
});

// ── Init ──────────────────────────────────────────────────────────
updateClock();
setInterval(updateClock, 30000);
setNow();
setActNow();
const _yl = document.getElementById('year-label');
if (_yl) _yl.textContent = `${chartYear}년`;
render();
</script>
